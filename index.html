</style>

     answer:1,rationale:"\u2018forced to trade \u00b7 cost \u00b7 Freedom \u00b7 Slavery \u00b7 prisoners\u2019이 일관되게 \u2018성공의 대가 = 자유의 상실\u2019을 재진술."},
    {type:"제목",q:"윗글의 제목으로 가장 적절한 것은?",
     choices:["Marble, Gold, and the Joy of Power","Prisoners in Jails of Their Own Making",
              "Why Kissing Up Pays Off","Freedom Is Overrated"],
     answer:1,rationale:"끝에서 두 번째 문장 \u2018prisoners in jails of their own making\u2019이 결론적 비유."},
    {type:"요약문",q:"빈칸 (A), (B)에 들어갈 말로 가장 적절한 것은? \u2014 Behind the trappings of success lies a (A)____ in which the powerful trade their (B)____ for marble and gold.",
     choices:["(A) gift / (B) ambition","(A) transaction / (B) freedom","(A) celebration / (B) wealth","(A) reward / (B) suit"],
     answer:1,rationale:"본문 \u2018transaction\u2019 + \u2018Mostly? Freedom.\u2019 + \u2018Slavery resides under marble and gold\u2019의 핵심 어휘 변형."}
  ]
}
];

/* ===================== STORE (localStorage) ===================== */
const LS_KEY = "hongi.passages.v2";
function loadPassages(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    const extra = raw ? JSON.parse(raw) : [];
    return [...DEFAULT_PASSAGES, ...(Array.isArray(extra)?extra:[])];
  }catch(e){ return [...DEFAULT_PASSAGES]; }
}
function saveExtraPassages(extra){
  localStorage.setItem(LS_KEY, JSON.stringify(extra));
}
function loadExtraPassages(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    return raw ? (JSON.parse(raw)||[]) : [];
  }catch(e){ return []; }
}

/* ===================== AUTH ===================== */
const SS_KEY = "hongi.session.v2";
function parseStudentId(id){
  // 8자리 숫자: 학교(2)+학년(1)+번호(5)
  if(!/^\d{8}$/.test(id)) return null;
  const school = id.slice(0,2);
  const grade  = id.slice(2,3);
  const serial = id.slice(3);
  return {
    role:"student",
    id, school, grade, serial,
    schoolName: SCHOOLS[school] || `학교${school}`,
    tags: ["ALL", `S${school}`, `S${school}-G${grade}`]
  };
}
function authenticate(id, pw){
  // 원장
  if(/^admin/i.test(id)){
    if(pw === "ascend") return {role:"admin", id, name:"원장(Admin)", tags:["*"]};
    return null;
  }
  // 학생
  const s = parseStudentId(id);
  if(s && pw === id){ // 데모: 비밀번호 = 학번
    return s;
  }
  return null;
}
function getSession(){
  try{ return JSON.parse(sessionStorage.getItem(SS_KEY)||"null"); }catch(e){ return null; }
}
function setSession(s){ sessionStorage.setItem(SS_KEY, JSON.stringify(s)); }
function clearSession(){ sessionStorage.removeItem(SS_KEY); }

/* ===================== FILTER ===================== */
function visiblePassages(session, all){
  if(!session) return [];
  if(session.role === "admin") return all;
  // 학생: targetTags 가 학생 태그와 1개라도 겹치면 OK
  return all.filter(p=>{
    const t = p.targetTags || ["ALL"];
    return t.some(x=> session.tags.includes(x));
  });
}

/* ===================== RENDER HELPERS ===================== */
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function flowParse(str){
  const re=/\[\[(\d+)\|([^\]]+)\]\]/g;
  let out="",last=0,m;
  while((m=re.exec(str))!==null){
    out+=escapeHtml(str.slice(last,m.index));
    out+=`<mark class="flow-token flow-c${m[1]}">${escapeHtml(m[2])}</mark>`;
    last=m.index+m[0].length;
  }
  out+=escapeHtml(str.slice(last));
  return out;
}

/* ===================== APP STATE ===================== */
let session=null, currentView="dash", currentPid=null, flowOn=false;

function go(view, pid){
  currentView = view;
  currentPid = pid || null;
  flowOn = false;
  render();
}

/* ===================== RENDER: dashboard ===================== */
function renderDashboard(){
  const all = loadPassages();
  const list = visiblePassages(session, all);

  const isAdmin = session.role === "admin";
  const adminHtml = isAdmin ? renderAdminPanel() : "";

  const cards = list.map(p=>{
    const tags = (p.targetTags||["ALL"]).map(t=>{
      const cls = t==="ALL" ? "tag all" : "tag";
      return `<span class="${cls}">${escapeHtml(t)}</span>`;
    }).join("");
    return `<div class="card" data-pid="${escapeHtml(p.id)}">
      <div class="no">Passage #${String(p.no||"").padStart(2,"0")}</div>
      <div class="ttl">${escapeHtml(p.title)}</div>
      <div class="topic">${escapeHtml(p.topic||"")}</div>
      <div class="tags">${tags}</div>
    </div>`;
  }).join("");

  const empty = list.length===0
    ? `<div class="empty">📭 현재 학생(${escapeHtml(session.schoolName||"")} ${escapeHtml(session.grade||"")}학년)에게 배정된 지문이 없습니다.</div>`
    : "";

  document.getElementById("main").innerHTML = `
    ${adminHtml}
    <div class="dash-head">
      <h2>${isAdmin?"📚 전체 콘텐츠":"📖 내 학습"}</h2>
      <span class="sub">${list.length}개 지문 · ${isAdmin?"원장 권한":`${escapeHtml(session.schoolName)} ${escapeHtml(session.grade)}학년`}</span>
    </div>
    ${empty}
    <div class="grid">${cards}</div>
  `;

  document.querySelectorAll(".card[data-pid]").forEach(el=>{
    el.addEventListener("click",()=> go("passage", el.dataset.pid));
  });
  if(isAdmin) bindAdminPanel();
  // toolbar buttons
  document.getElementById("flowBtn").style.display="none";
  document.getElementById("printBtn").style.display="none";
  document.getElementById("homeBtn").style.display="none";
}

function renderAdminPanel(){
  return `
  <div class="admin-panel">
    <h3>🔐 Content Manager (원장 전용)</h3>
    <div class="ph">새 지문을 추가합니다. 입력 후 [추가] 버튼 → localStorage 저장 → 즉시 목록 반영.</div>
    <div class="row">
      <div><label>제목</label><input id="cm-title" placeholder="예: Orwell - On Power" /></div>
      <div><label>출처</label><input id="cm-source" placeholder="예: 1984 발췌" /></div>
    </div>
    <div class="row">
      <div><label>주제(한글 한줄)</label><input id="cm-topic" placeholder="권력은 그 자체가 목적이다." /></div>
      <div><label>대상 태그(쉼표) — ALL / S01 / S01-G2 등</label><input id="cm-tags" placeholder="S01-G2, S02-G3" /></div>
    </div>
    <label>본문 영문 (한 줄에 한 문장, [[그룹|단어]] 마크업 가능)</label>
    <textarea id="cm-en" placeholder="Power is not a means; it is an [[1|end]].&#10;One does not establish a [[2|dictatorship]] in order to safeguard a revolution."></textarea>
    <label>직독직해 (영문과 같은 줄 수, 한 줄에 한 문장)</label>
    <textarea id="cm-ko" placeholder="권력은 수단이 아니라 목적이다.&#10;혁명을 지키기 위해 독재를 세우는 것이 아니다."></textarea>
    <div class="actions">
      <button class="btn admin" id="cm-add">+ 지문 추가</button>
      <button class="btn" id="cm-clear">localStorage 추가분 전체 삭제</button>
      <span class="msg" id="cm-msg">현재 추가분: <b>${loadExtraPassages().length}</b>개</span>
    </div>
  </div>`;
}

function bindAdminPanel(){
  document.getElementById("cm-add").addEventListener("click",()=>{
    const title=v("cm-title"), source=v("cm-source"), topic=v("cm-topic"),
          tagsRaw=v("cm-tags"), en=v("cm-en"), ko=v("cm-ko");
    const msg=document.getElementById("cm-msg");
    if(!title || !en){ msg.className="msg err"; msg.textContent="제목과 본문은 필수입니다."; return; }
    const enLines = en.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    const koLines = ko.split(/\r?\n/).map(s=>s.trim());
    const sentences = enLines.map((line,i)=>({en:line, ko:koLines[i]||"", vocab:[]}));
    const tags = (tagsRaw||"ALL").split(",").map(s=>s.trim()).filter(Boolean);
    const extra = loadExtraPassages();
    const newP = {
      id:"u"+Date.now(),
      no: DEFAULT_PASSAGES.length + extra.length + 1,
      title, source, topic, targetTags: tags.length?tags:["ALL"],
      thesis: topic || "",
      sentences, habruta:[], blanks:[], variants:[]
    };
    extra.push(newP);
    saveExtraPassages(extra);
    msg.className="msg ok"; msg.textContent=`✓ 추가됨. 현재 추가분: ${extra.length}개`;
    setTimeout(()=>render(), 400);
  });
  document.getElementById("cm-clear").addEventListener("click",()=>{
    if(!confirm("localStorage에 추가된 지문을 모두 삭제할까요?")) return;
    saveExtraPassages([]);
    render();
  });
  function v(id){ return (document.getElementById(id).value||"").trim(); }
}

/* ===================== RENDER: passage ===================== */
function renderPassage(){
  const all = loadPassages();
  const p = all.find(x=>x.id===currentPid);
  if(!p){ go("dash"); return; }

  const sentencesHtml = (p.sentences||[]).map((s,i)=>`
    <div class="sent">
      <span class="no">#${String(i+1).padStart(2,"0")}</span>
      <div class="en">${flowParse(s.en||"")}</div>
      ${s.ko?`<div class="ko">${escapeHtml(s.ko)}</div>`:""}
      ${(s.vocab&&s.vocab.length)?`
      <table>
        <thead><tr><th style="width:18%">Word</th><th style="width:8%">POS</th><th style="width:24%">뜻</th><th style="width:25%">Synonyms</th><th style="width:25%">Antonyms</th></tr></thead>
        <tbody>${s.vocab.map(v=>`<tr><td><b>${escapeHtml(v[0])}</b></td><td>${escapeHtml(v[1])}</td><td>${escapeHtml(v[2])}</td><td>${escapeHtml(v[3])}</td><td>${escapeHtml(v[4])}</td></tr>`).join("")}</tbody>
      </table>`:""}
    </div>`).join("");

  const habrutaHtml = (p.habruta&&p.habruta.length)
    ? `<div class="section"><h2>② 하브루타 메타인지 토론</h2><ol class="hb">${p.habruta.map(h=>`<li>${escapeHtml(h)}</li>`).join("")}</ol></div>` : "";

  const blanksHtml = (p.blanks&&p.blanks.length)
    ? `<div class="section"><h2>③ 빈칸 마스터 테스트</h2>${p.blanks.map((b,i)=>`
      <div class="blank" data-i="${i}">
        <span>${i+1}.</span>
        <span>${escapeHtml(b[0]).replace("____",`<input data-ans="${escapeHtml(b[1])}" placeholder="(${escapeHtml(b[2])})"/>`)}</span>
        <button class="btn" data-check="${i}">확인</button>
        <span class="ans">정답: <b>${escapeHtml(b[1])}</b></span>
      </div>`).join("")}</div>` : "";

  const variantsHtml = (p.variants&&p.variants.length)
    ? `<div class="section"><h2>④ 수능형 변형 문제 (Paraphrasing)</h2>${p.variants.map((v,i)=>`
      <div class="var">
        <div class="q">[변형 ${i+1} · ${escapeHtml(v.type)}] ${escapeHtml(v.q)}</div>
        <ol>${v.choices.map(c=>`<li>${escapeHtml(c)}</li>`).join("")}</ol>
        <div class="ans">정답: ${v.answer+1}번</div>
        <div class="rat">근거: ${escapeHtml(v.rationale)}</div>
      </div>`).join("")}</div>` : "";

  document.getElementById("main").innerHTML = `
    <button class="btn back-btn no-print" id="backBtn">← 목록으로</button>
    <div class="sheet" id="sheet">
      <div class="head">
        <div>
          <div class="t">Hongi Ascend High-Master v2.0</div>
          <div class="s">Passage #${String(p.no||"").padStart(2,"0")} · ${escapeHtml(p.title)}</div>
        </div>
        <div class="s">${escapeHtml(p.source||"")}</div>
      </div>
      <div class="meta">주제 · ${escapeHtml(p.topic||"")}</div>
      ${p.thesis?`<div class="thesis">${flowParse(p.thesis)}</div>`:""}
      <div class="section"><h2>① 본문 정밀 분석 (FLOW · 직독직해 · Vocab Master)</h2>${sentencesHtml}</div>
      ${habrutaHtml}${blanksHtml}${variantsHtml}
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click",()=>go("dash"));
  document.querySelectorAll("[data-check]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const row=btn.closest(".blank");
      const inp=row.querySelector("input");
      const ok=(inp.value||"").trim().toLowerCase()===inp.dataset.ans.toLowerCase();
      row.classList.add("show");
      inp.style.borderColor = ok ? "#0f766e" : "#b91c1c";
    });
  });

  document.getElementById("flowBtn").style.display="";
  document.getElementById("printBtn").style.display="";
  document.getElementById("homeBtn").style.display="";
  document.getElementById("flowBtn").textContent = "🌊 FLOW ON";
}

/* ===================== RENDER router ===================== */
function render(){
  // who
  const who = document.getElementById("who");
  if(session.role==="admin"){
    who.innerHTML = `<b>${escapeHtml(session.name)}</b> <span class="role-chip admin">ADMIN</span>`;
  }else{
    who.innerHTML = `<b>${escapeHtml(session.id)}</b> · ${escapeHtml(session.schoolName)} ${escapeHtml(session.grade)}학년 <span class="role-chip student">STUDENT</span>`;
  }
  if(currentView==="dash") renderDashboard();
  else renderPassage();
}

/* ===================== Boot ===================== */
function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  go("dash");
}
function tryLogin(){
  const id=document.getElementById("lg-id").value.trim();
  const pw=document.getElementById("lg-pw").value;
  const s=authenticate(id,pw);
  if(s){ setSession(s); session=s; showApp(); }
  else{ document.getElementById("lg-err").textContent="아이디 또는 비밀번호가 올바르지 않습니다. (학생 PW = 학번)"; }
}
document.getElementById("lg-go").addEventListener("click",tryLogin);
document.getElementById("lg-pw").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
document.getElementById("logout").addEventListener("click",()=>{ clearSession(); location.reload(); });
document.getElementById("flowBtn").addEventListener("click",()=>{
  flowOn=!flowOn;
  const sh=document.getElementById("sheet");
  if(sh) sh.classList.toggle("flow-on",flowOn);
  document.getElementById("flowBtn").textContent = flowOn ? "🌊 FLOW OFF" : "🌊 FLOW ON";
});
document.getElementById("printBtn").addEventListener("click",()=>window.print());
document.getElementById("homeBtn").addEventListener("click",()=>go("dash"));

// auto-resume
const saved=getSession();
if(saved){ session=saved; showApp(); }
</script>
