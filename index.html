<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hongi Ascend High-Master v1.0 · Seneca</title>
<style>
  :root{
    --bg:#f5f7fb; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --primary:#1d4ed8; --primary-ink:#ffffff;
    --f1:#fde68a; --f2:#bbf7d0; --f3:#bfdbfe; --f4:#fbcfe8; --f5:#ddd6fe;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,-apple-system,sans-serif;}
  button{font-family:inherit;cursor:pointer}
  /* ===== Login ===== */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1e3a8a,#1d4ed8 60%,#0ea5e9);z-index:50}
  #login .box{background:#fff;border-radius:20px;padding:36px 32px;width:360px;
    box-shadow:0 30px 80px rgba(0,0,0,.3)}
  #login h1{margin:0 0 4px;font-size:22px;letter-spacing:-.5px}
  #login p.sub{margin:0 0 22px;color:var(--muted);font-size:13px}
  #login label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  #login input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  #login input:focus{outline:none;border-color:var(--primary)}
  #login button.go{margin-top:18px;width:100%;padding:12px;background:var(--primary);color:#fff;
    border:0;border-radius:12px;font-weight:800;font-size:14px}
  #login .err{color:#b91c1c;font-size:12px;margin-top:8px;min-height:16px}
  #login .hint{margin-top:14px;font-size:11px;color:var(--muted);text-align:center}

  /* ===== App shell ===== */
  #app{display:none}
  .topbar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);
    padding:10px 20px;display:flex;align-items:center;gap:14px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.3px}
  .brand .h{width:32px;height:32px;border-radius:9px;background:var(--primary);color:#fff;
    display:grid;place-items:center;font-weight:900;cursor:pointer;user-select:none}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .spacer{flex:1}
  .btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn.warn{background:#f59e0b;color:#fff;border-color:#f59e0b}

  .wrap{padding:24px;display:flex;justify-content:center}
  .sheet{width:180mm;background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:14mm;box-shadow:0 10px 40px rgba(15,23,42,.06)}
  .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--ink);
    padding-bottom:8px;margin-bottom:14px}
  .head .t{font-size:18px;font-weight:900;letter-spacing:-.4px}
  .head .s{font-size:11px;color:var(--muted)}
  .meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .thesis{background:#f1f5f9;border-left:4px solid var(--primary);padding:10px 12px;border-radius:8px;
    font-size:13px;margin-bottom:14px}

  .sent{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px;position:relative}
  .sent .no{position:absolute;top:-9px;left:10px;background:var(--primary);color:#fff;font-size:10px;
    padding:1px 8px;border-radius:999px;font-weight:800}
  .en{font-size:13.5px;line-height:1.7;margin:4px 0 4px}
  .ko{font-size:12px;color:#334155;border-top:1px dashed var(--line);padding-top:6px}
  table{width:100%;border-collapse:collapse;margin-top:6px;font-size:11px}
  th,td{border:1px solid var(--line);padding:4px 6px;vertical-align:top;text-align:left}
  th{background:#f8fafc;font-weight:700;color:#475569}

  .flow-token{background:transparent;color:inherit;padding:0;border-radius:3px;transition:background .35s ease,color .35s ease}
  .flow-on .flow-c1{background:var(--f1)}
  .flow-on .flow-c2{background:var(--f2)}
  .flow-on .flow-c3{background:var(--f3)}
  .flow-on .flow-c4{background:var(--f4)}
  .flow-on .flow-c5{background:var(--f5)}

  .section{margin-top:16px;border-top:2px solid var(--ink);padding-top:10px}
  .section h2{font-size:14px;margin:0 0 8px;letter-spacing:-.3px}
  .hb li{font-size:12px;margin-bottom:4px;line-height:1.55}
  .blank{display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:12px;margin:5px 0}
  .blank input{padding:3px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;min-width:120px}
  .blank .ans{display:none;color:#0f766e;font-weight:700}
  .blank.show .ans{display:inline}
  .var{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:8px;font-size:12px}
  .var .q{font-weight:700;margin-bottom:4px}
  .var ol{margin:4px 0 4px 18px;padding:0}
  .var .ans{font-size:11px;color:#0f766e;margin-top:4px}
  .var .rat{font-size:11px;color:var(--muted);margin-top:2px}

  /* ===== Print ===== */
  @page{size:A4;margin:15mm}
  @media print{
    body{background:#fff}
    .no-print,.topbar{display:none !important}
    .wrap{padding:0}
    .sheet{width:auto;border:0;box-shadow:none;padding:0;border-radius:0}
    .sent{break-inside:avoid}
  }
</style>
</head>
<body>

<!-- ============== LOGIN ============== -->
<div id="login">
  <div class="box">
    <h1>홍이어쎈영어 · Hongi Ascend</h1>
    <p class="sub">High-Master v1.0 · 원장 전용 학습 콘솔</p>
    <label>아이디</label>
    <input id="lg-id" type="text" autocomplete="username" placeholder="hongi" />
    <label>비밀번호</label>

  </div>
</div>

<!-- ============== APP ============== -->
<div id="app">
  <div class="topbar no-print">
    <div class="brand">
      <div class="h" id="logo" title="트리플 클릭 = Admin">H</div>
      <div>홍이어쎈 Ascend
        <small>High-Master v1.0 · A4 180mm · 15mm margin</small>
      </div>
    </div>

    <button class="btn primary" onclick="window.print()">🖨 A4 인쇄</button>
    <button class="btn warn" id="logout">로그아웃</button>

  <div class="wrap">
    <div class="sheet" id="sheet"><!-- rendered by JS --></div>

</div>

        ["of one\u2019s own making","phr.","스스로 자초한","self-inflicted, self-imposed","imposed by others"]
      ]

/* ===================== RENDER ===================== */
function flowParse(str){
  const re=/\[\[(\d+)\|([^\]]+)\]\]/g;
  let out="",last=0,m;
  while((m=re.exec(str))!==null){
    out+=escapeHtml(str.slice(last,m.index));
    out+=`<mark class="flow-token flow-c${m[1]}">${escapeHtml(m[2])}</mark>`;
    last=m.index+m[0].length;
  }
  out+=escapeHtml(str.slice(last));
  return out;
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function render(){
  const p=PASSAGE;
  const sentencesHtml = p.sentences.map((s,i)=>`
    <div class="sent">
      <span class="no">#${String(i+1).padStart(2,"0")}</span>
      <div class="en">${flowParse(s.en)}</div>
      <div class="ko">${escapeHtml(s.ko)}</div>
      <table>
        <thead><tr><th style="width:18%">Word</th><th style="width:8%">POS</th><th style="width:24%">뜻</th><th style="width:25%">Synonyms</th><th style="width:25%">Antonyms</th></tr></thead>
        <tbody>${s.vocab.map(v=>`<tr><td><b>${escapeHtml(v[0])}</b></td><td>${escapeHtml(v[1])}</td><td>${escapeHtml(v[2])}</td><td>${escapeHtml(v[3])}</td><td>${escapeHtml(v[4])}</td></tr>`).join("")}</tbody>
      </table>
    </div>`).join("");

  const habrutaHtml = `<ol class="hb">${p.habruta.map(h=>`<li>${escapeHtml(h)}</li>`).join("")}</ol>`;

  const blanksHtml = p.blanks.map((b,i)=>`
    <div class="blank" data-i="${i}">
      <span>${i+1}.</span>
      <span>${escapeHtml(b[0]).replace("____",`<input data-ans="${escapeHtml(b[1])}" placeholder="(${escapeHtml(b[2])})"/>`)}</span>
      <button class="btn" data-check="${i}">확인</button>
      <span class="ans">정답: <b>${escapeHtml(b[1])}</b></span>
    </div>`).join("");

  const variantsHtml = p.variants.map((v,i)=>`
    <div class="var">
      <div class="q">[변형 ${i+1} · ${escapeHtml(v.type)}] ${escapeHtml(v.q)}</div>
      <ol>${v.choices.map(c=>`<li>${escapeHtml(c)}</li>`).join("")}</ol>
      <div class="ans">정답: ${v.answer+1}번</div>
      <div class="rat">근거: ${escapeHtml(v.rationale)}</div>
    </div>`).join("");

  document.getElementById("sheet").innerHTML = `
    <div class="head">
      <div>
        <div class="t">Hongi Ascend High-Master v1.0</div>
        <div class="s">Passage #${String(p.no).padStart(2,"0")} · ${escapeHtml(p.title)}</div>
      </div>
      <div class="s">${escapeHtml(p.source)}</div>
    </div>
    <div class="meta">주제 · ${escapeHtml(p.topic)}</div>
    <div class="thesis">${flowParse(p.thesis)}</div>

    <div class="section"><h2>① 본문 정밀 분석 (FLOW · 직독직해 · Vocab Master)</h2>${sentencesHtml}</div>
    <div class="section"><h2>② 하브루타 메타인지 토론 (5문항)</h2>${habrutaHtml}</div>
    <div class="section"><h2>③ 빈칸 마스터 테스트</h2>${blanksHtml}</div>
    <div class="section"><h2>④ 수능형 변형 문제 (Paraphrasing)</h2>${variantsHtml}</div>
  `;

  // blank check
  document.querySelectorAll("[data-check]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const row=btn.closest(".blank");
      const inp=row.querySelector("input");
      const ok=(inp.value||"").trim().toLowerCase()===inp.dataset.ans.toLowerCase();
      row.classList.add("show");
      inp.style.borderColor = ok ? "#0f766e" : "#b91c1c";
    });
  });
}

/* ===================== FLOW toggle ===================== */
let flowOn=false;
function bindApp(){
  document.getElementById("flowBtn").addEventListener("click",()=>{
    flowOn=!flowOn;
    document.getElementById("sheet").classList.toggle("flow-on",flowOn);
    document.getElementById("flowBtn").textContent = flowOn ? "🌊 FLOW OFF" : "🌊 FLOW ON";
  });
  document.getElementById("logout").addEventListener("click",()=>{
    sessionStorage.removeItem("hongi.auth");
    location.reload();
  });
  // hidden admin (triple-click)
  let clicks=0,timer=null;
  document.getElementById("logo").addEventListener("click",()=>{
    clicks++;
    clearTimeout(timer);
    timer=setTimeout(()=>clicks=0,600);
    if(clicks>=3){clicks=0;alert("🔐 Admin Mode: 데이터 편집은 PASSAGE 객체를 직접 수정하세요.");}
  });
}

/* ===================== Login ===================== */
function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}
function tryLogin(){
  const id=document.getElementById("lg-id").value.trim();
  const pw=document.getElementById("lg-pw").value;
  if(id==="hongi" && pw==="ascend"){
    sessionStorage.setItem("hongi.auth","1");
    showApp();
  }else{
    document.getElementById("lg-err").textContent="아이디 또는 비밀번호가 올바르지 않습니다.";
  }
}
document.getElementById("lg-go").addEventListener("click",tryLogin);
document.getElementById("lg-pw").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});

/* ===================== Boot ===================== */
render();
bindApp();
if(sessionStorage.getItem("hongi.auth")==="1") showApp();
</script>
</body>
</html>
