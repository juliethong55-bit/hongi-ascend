<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>홍이어쎈 통합 포털 · Hongi Ascend High-Master v3.0</title>
<style>
  :root{
    --bg:#f5f7fb; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --primary:#1d4ed8; --primary-ink:#ffffff; --admin:#9333ea;
    --f1:#fde68a; --f2:#bbf7d0; --f3:#bfdbfe; --f4:#fbcfe8; --f5:#ddd6fe;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;}
  button{font-family:inherit;cursor:pointer}
  /* ===== Login ===== */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#1e3a8a,#1d4ed8 60%,#0ea5e9);z-index:50;padding:20px}
  #login .box{background:#fff;border-radius:20px;padding:36px 32px;width:380px;
    box-shadow:0 30px 80px rgba(0,0,0,.3)}
  #login h1{margin:0 0 4px;font-size:22px;letter-spacing:-.5px}
  #login p.sub{margin:0 0 22px;color:var(--muted);font-size:13px}
  #login label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  #login input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px}
  #login input:focus{outline:none;border-color:var(--primary)}
  #login button.go{margin-top:18px;width:100%;padding:12px;background:var(--primary);color:#fff;
    border:0;border-radius:12px;font-weight:800;font-size:14px}
  #login .err{color:#b91c1c;font-size:12px;margin-top:8px;min-height:16px}
  #login .hint{margin-top:14px;font-size:11px;color:var(--muted);text-align:center;line-height:1.7}
  #login .hint code{background:#f1f5f9;padding:1px 6px;border-radius:4px}

  /* ===== App shell ===== */
  #app{display:none}
  .topbar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);
    padding:10px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.3px}
  .brand .h{width:32px;height:32px;border-radius:9px;background:var(--primary);color:#fff;
    display:grid;place-items:center;font-weight:900}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .who{font-size:12px;color:var(--muted);margin-left:8px}
  .who b{color:var(--ink)}
  .role-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;margin-left:6px}
  .role-chip.admin{background:#f3e8ff;color:#6b21a8}
  .role-chip.student{background:#dbeafe;color:#1e40af}
  .spacer{flex:1}
  .btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:12px;font-weight:700}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn.warn{background:#f59e0b;color:#fff;border-color:#f59e0b}
  .btn.admin{background:var(--admin);color:#fff;border-color:var(--admin)}

  .wrap{padding:20px;display:flex;justify-content:center}
  .container{width:min(1080px,100%)}

  /* ===== Dashboard list ===== */
  .dash-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px}
  .dash-head h2{margin:0;font-size:18px;letter-spacing:-.4px}
  .dash-head .sub{font-size:12px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;
    transition:transform .15s ease,box-shadow .15s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(15,23,42,.08)}
  .card .no{font-size:11px;color:var(--muted);font-weight:700}
  .card .ttl{font-size:15px;font-weight:800;margin:4px 0 6px;letter-spacing:-.3px}
  .card .topic{font-size:12px;color:#334155;line-height:1.5}
  .card .tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px}
  .tag{font-size:10px;background:#eff6ff;color:#1e40af;padding:2px 7px;border-radius:999px;font-weight:700}
  .tag.all{background:#dcfce7;color:#166534}
  .empty{padding:40px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:14px}

  /* ===== Sheet (passage view) ===== */
  .sheet{width:180mm;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:14px;
    padding:14mm;box-shadow:0 10px 40px rgba(15,23,42,.06);margin:0 auto}
  .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--ink);
    padding-bottom:8px;margin-bottom:14px}
  .head .t{font-size:18px;font-weight:900;letter-spacing:-.4px}
  .head .s{font-size:11px;color:var(--muted)}
  .meta{font-size:12px;color:var(--muted);margin-bottom:10px}
  .thesis{background:#f1f5f9;border-left:4px solid var(--primary);padding:10px 12px;border-radius:8px;
    font-size:13px;margin-bottom:14px}
  .sent{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:10px;position:relative}
  .sent .no{position:absolute;top:-9px;left:10px;background:var(--primary);color:#fff;font-size:10px;
    padding:1px 8px;border-radius:999px;font-weight:800}
  .en{font-size:13.5px;line-height:1.7;margin:4px 0 4px}
  .ko{font-size:12px;color:#334155;border-top:1px dashed var(--line);padding-top:6px}
  table{width:100%;border-collapse:collapse;margin-top:6px;font-size:11px}
  th,td{border:1px solid var(--line);padding:4px 6px;vertical-align:top;text-align:left}
  th{background:#f8fafc;font-weight:700;color:#475569}
  .flow-token{background:transparent;color:inherit;padding:0;border-radius:3px;
    transition:background .35s ease,color .35s ease}
  .flow-on .flow-c1{background:var(--f1)}
  .flow-on .flow-c2{background:var(--f2)}
  .flow-on .flow-c3{background:var(--f3)}
  .flow-on .flow-c4{background:var(--f4)}
  .flow-on .flow-c5{background:var(--f5)}
  .section{margin-top:16px;border-top:2px solid var(--ink);padding-top:10px}
  .section h2{font-size:14px;margin:0 0 8px;letter-spacing:-.3px}
  .hb li{font-size:12px;margin-bottom:4px;line-height:1.55}
  .blank{display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:12px;margin:5px 0}
  .blank input{padding:3px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;min-width:120px}
  .blank .ans{display:none;color:#0f766e;font-weight:700}
  .blank.show .ans{display:inline}
  .var{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:8px;font-size:12px}
  .var .q{font-weight:700;margin-bottom:4px}
  .var ol{margin:4px 0 4px 18px;padding:0}
  .var .ans{font-size:11px;color:#0f766e;margin-top:4px}
  .var .rat{font-size:11px;color:var(--muted);margin-top:2px}

  /* ===== Admin Console ===== */
  .admin-panel{background:#fff;border:2px solid var(--admin);border-radius:14px;padding:18px;margin-bottom:16px}
  .admin-panel h3{margin:0 0 4px;font-size:15px;color:var(--admin);letter-spacing:-.3px}
  .admin-panel .ph{font-size:11px;color:var(--muted);margin-bottom:12px}
  .admin-panel .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
  .admin-panel label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:700}
  .admin-panel input,.admin-panel textarea{width:100%;padding:7px 10px;border:1px solid var(--line);
    border-radius:8px;font-size:12px;font-family:inherit}
  .admin-panel textarea{min-height:90px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px}
  .admin-panel .actions{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .admin-panel .msg{font-size:11px;color:var(--muted)}
  .admin-panel .msg.ok{color:#0f766e}
  .admin-panel .msg.err{color:#b91c1c}

  .back-btn{margin-bottom:12px}

  /* ===== Print ===== */
  @page{size:A4;margin:15mm}
  @media print{
    body{background:#fff}
    .no-print,.topbar{display:none !important}
    .wrap{padding:0}
    .sheet{width:auto;border:0;box-shadow:none;padding:0;border-radius:0;max-width:none}
    .sent{break-inside:avoid}
    .section{break-inside:avoid}
  }

  /* ===== Tabs (admin) ===== */
  .tabs{display:flex;gap:6px;margin-bottom:10px;border-bottom:1px solid var(--line)}
  .tabs button{background:transparent;border:0;padding:8px 14px;font-weight:800;font-size:12px;color:var(--muted);
    border-bottom:3px solid transparent;border-radius:0}
  .tabs button.on{color:var(--admin);border-bottom-color:var(--admin)}
  .pane{display:none}
  .pane.on{display:block}

  /* ===== Grammar card / sheet ===== */
  .card.gram{border-left:4px solid #9333ea}
  .card.gram .no{color:#9333ea}
  .gram-tag{font-size:10px;background:#f3e8ff;color:#6b21a8;padding:2px 7px;border-radius:999px;font-weight:700}
  .formula{background:#fef3c7;border-left:4px solid #f59e0b;border-radius:8px;padding:10px 12px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;margin:10px 0}
  .gram-desc{font-size:13px;line-height:1.7;color:#1f2937;margin:8px 0 12px;white-space:pre-wrap}
  .ex-block{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
  .ex-block .en{font-size:13.5px;font-weight:600;line-height:1.7}
  .ex-block .ko{font-size:12px;color:#334155;border-top:1px dashed var(--line);padding-top:6px;margin-top:6px}
  .ex-block .note{font-size:11.5px;color:#6b21a8;margin-top:6px;line-height:1.6}
  .ex-block mark.hl{background:#fef08a;padding:1px 4px;border-radius:4px;font-weight:700}
  .pq{border:1px dashed var(--line);border-radius:8px;padding:8px 11px;margin-bottom:6px;font-size:12.5px;line-height:1.7}
  .pq .a{display:none;color:#0f766e;font-weight:700;margin-top:4px}
  .pq.show .a{display:block}

  /* ===== JUNIOR HARNESS ===== */
  .sheet.junior{font-size:110%}
  .sheet.junior .en{font-size:15px;line-height:2.0}
  .sheet.junior .ko{font-size:13.5px;line-height:1.9}
  .sheet.junior .sent{padding:14px 16px;margin-bottom:14px;border-width:2px}
  .sheet.junior .gram-desc{font-size:14.5px;line-height:2.0}
  .sheet.junior .formula{font-size:14.5px;padding:14px}
  .sheet.junior .section h2{font-size:15.5px}
  .sheet.junior table{font-size:12.5px}
  .sheet.junior th,.sheet.junior td{padding:6px 8px}
  .junior-banner{background:#fff7ed;border:1px solid #fdba74;color:#9a3412;font-size:12px;
    padding:6px 10px;border-radius:8px;margin-bottom:10px;font-weight:700}
  .memo-box{border:1px dashed #94a3b8;border-radius:8px;height:60px;margin-top:6px;
    background:repeating-linear-gradient(transparent,transparent 19px,#e2e8f0 20px);
    position:relative}
  .memo-box::before{content:"📝 메모";position:absolute;top:-9px;left:10px;background:#fff;
    padding:0 6px;font-size:10px;color:#64748b;font-weight:700}

  /* highlighter toolbar */
  .hl-tools{display:flex;gap:6px;align-items:center;margin:6px 0 10px;flex-wrap:wrap}
  .hl-tools .pen{border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;background:#fff}
  .hl-tools .pen.on{outline:3px solid #fde68a}
  .hl-target mark.user-hl{background:#fef08a;border-radius:3px;padding:0 2px}
  .hl-target mark.user-hl.green{background:#bbf7d0}
  .hl-target mark.user-hl.pink{background:#fbcfe8}

  @media print{
    .sheet.junior{font-size:115%}
    .sheet.junior .sent{break-inside:avoid;margin-bottom:18px}
    .memo-box{height:80px}
    .tabs,.hl-tools{display:none !important}
  }

</style>
</head>

<!-- ============== LOGIN ============== -->
<div id="login">
  <div class="box">

</div>

<script>

const SCHOOLS = {

};

   - "S{학교}-G{학년}": 해당 학교+학년 (예 "S01-G2")
*/
const DEFAULT_PASSAGES = [
{
  id:"p1", no:1,
  title:"Seneca: The True Cost of Success",

  targetTags:["ALL"],
  thesis:"[[1|성공]]의 화려한 외양 뒤에는 [[2|강요된]] 행동과 [[3|자유의 상실]]이라는 [[4|숨겨진 대가]]가 존재한다.",
  sentences:[
    {ko:"세상에서 가장 강력하고, 부유하며, 유명한 사람들 몇 명을 살펴보라.",
     en:"Take a look at some of the most [[1|powerful]], [[1|rich]], and [[1|famous]] people in the world.",
     vocab:[["powerful","adj.","강력한, 영향력 있는","influential, mighty, dominant","weak, powerless"],
            ["rich","adj.","부유한","wealthy, affluent, well-off","poor, destitute"],
            ["famous","adj.","유명한","renowned, celebrated, prominent","obscure, unknown"]]},
    {ko:"그들의 성공이 가져다준 화려한 장식들과 그들이 살 수 있는 것들은 무시하라.",
     en:"Ignore the [[1|trappings]] of their [[1|success]] and what they\u2019re able to buy.",
     vocab:[["ignore","v.","무시하다","disregard, overlook, dismiss","notice, heed"],
            ["trappings","n.(pl.)","겉치레, 부속물, 장식","ornaments, adornments, accoutrements","essentials, substance"],
            ["success","n.","성공","achievement, triumph, prosperity","failure, defeat"]]},
    {ko:"그 대신 그들이 그 대가로 어쩔 수 없이 내어주는 것을 보라 \u2014 성공이 그들에게 무엇을 치르게 했는지를 보라.",
     en:"Look instead at what they\u2019re [[2|forced]] to [[4|trade in return]]\u2014look at what [[1|success]] has [[4|cost]] them.",
     vocab:[["forced","adj.","강요된, 어쩔 수 없는","compelled, coerced, obliged","voluntary, willing"],
            ["trade","v./n.","맞바꾸다, 거래(하다)","exchange, swap, barter","retain, keep"],
            ["in return","phr.","그 대가로","in exchange, as a trade-off","for free, gratis"],
            ["cost","v.","(대가를) 치르게 하다","exact, charge, deprive of","give, grant"]]},
    {ko:"대개? 자유다. 그들의 일은 정장을 입을 것을 요구한다.",
     en:"Mostly? [[3|Freedom]]. Their work [[2|demands]] they wear a suit.",
     vocab:[["mostly","adv.","대개, 주로","primarily, largely, chiefly","rarely, seldom"],
            ["freedom","n.","자유","liberty, autonomy, independence","slavery, bondage"],
            ["demand","v.","요구하다","require, insist on, exact","offer, relinquish"],
            ["suit","n.","정장","formal attire, business dress","casual wear"]]},
    {ko:"그들의 성공은 어떤 파티에 참석하고, 좋아하지 않는 사람들에게 아부하는 일에 달려 있다.",
     en:"Their [[1|success]] [[2|depends on]] attending certain parties, [[5|kissing up]] to people they don\u2019t like.",
     vocab:[["depend on","phr.v.","~에 달려 있다, 좌우되다","rely on, hinge on, be contingent on","be independent of"],
            ["attend","v.","참석하다","be present at, show up at","miss, skip"],
            ["kiss up to","phr.v.","아부하다, 비위를 맞추다","flatter, fawn over, suck up to","snub, defy"],
            ["certain","adj.","특정한, 어떤","particular, specific","any, random"]]},
    {ko:"그것은 \u2014 필연적으로 \u2014 자신이 실제로 생각하는 것을 말할 수 없음을 깨닫게 만들 것이다.",
     en:"It will [[2|require]]\u2014[[2|inevitably]]\u2014realizing they are [[3|unable to say what they actually think]].",

    {ko:"더 나쁜 것은, 그것은 그들이 다른 종류의 사람이 되거나 나쁜 짓을 하기를 요구한다는 것이다.",
     en:"Worse, it [[2|demands]] that they [[5|become a different type of person]] or [[5|do bad things]].",
     vocab:[["worse","adv./adj.","더 나쁘게(은)","more gravely, even more so","better"],
            ["demand (that)","v.","~할 것을 요구하다","insist that, require that","permit, allow"],
            ["type","n.","종류, 유형","kind, sort, category","\u2014"]]},
    {ko:"물론, 그것은 보수가 좋을 수도 있다 \u2014 그러나 그들은 그 거래를 진정으로 따져본 적이 없다.",
     en:"Sure, it might [[1|pay well]]\u2014but they haven\u2019t truly examined the [[4|transaction]].",
     vocab:[["sure","adv.","물론, 분명히","certainly, indeed, granted","doubtfully"],
            ["pay well","phr.","보수가 좋다","be lucrative, be remunerative","pay poorly"],
            ["truly","adv.","진정으로","genuinely, sincerely, really","superficially, falsely"],

            ["transaction","n.","거래","exchange, deal, bargain","gift, donation"]]},
    {ko:"세네카가 말했듯이, \u201C노예 상태는 대리석과 황금 아래에 거(居)한다.\u201D",
     en:"As Seneca put it, \u201C[[3|Slavery]] resides under [[1|marble and gold]].\u201D",
     vocab:[["put it","phr.","(말로) 표현하다","phrase it, express it, word it","\u2014"],

/* ===== junior detection ===== */
function isJuniorTags(tags){
  const arr = tags||[];
  return arr.some(t=> /^중[123]$/.test(t));
}
function isJuniorSession(s){
  if(!s || s.role!=="student") return false;
  // grade "1"/"2"/"3" of school code 99 reserved 또는 명시적 중등 코드 가능
  // 데모: 학교코드가 "10","11","12" 또는 학번 prefix가 'M' 시작이면 junior
  return /^(1[0-2])$/.test(s.school);
}

/* ===================== AUTH ===================== */
const SS_KEY = "hongi.session.v3";
function parseStudentId(id){
  // 8자리 숫자: 학교(2)+학년(1)+번호(5)
  if(!/^\d{8}$/.test(id)) return null;
  const school = id.slice(0,2);
  const grade  = id.slice(2,3);
  const serial = id.slice(3);
  return {
    role:"student",
    id, school, grade, serial,
    schoolName: SCHOOLS[school] || `학교${school}`,
    tags: ["ALL", `S${school}`, `S${school}-G${grade}`, ...(/^(1[0-2])$/.test(school)?["중"+grade]:[])]
  };
}
function authenticate(id, pw){
  // 원장
  if(/^admin/i.test(id)){
    if(pw === "ascend") return {role:"admin", id, name:"원장(Admin)", tags:["*"]};
    return null;
  }
  // 학생
  const s = parseStudentId(id);
  if(s && pw === id){ // 데모: 비밀번호 = 학번
    return s;
  }
  return null;
}
function getSession(){
  try{ return JSON.parse(sessionStorage.getItem(SS_KEY)||"null"); }catch(e){ return null; }
}
function setSession(s){ sessionStorage.setItem(SS_KEY, JSON.stringify(s)); }
function clearSession(){ sessionStorage.removeItem(SS_KEY); }

/* ===================== FILTER ===================== */
function visiblePassages(session, all){
  if(!session) return [];
  if(session.role === "admin") return all;
  // 학생: targetTags 가 학생 태그와 1개라도 겹치면 OK
  return all.filter(p=>{
    const t = p.targetTags || ["ALL"];
    return t.some(x=> session.tags.includes(x));
  });
}

/* ===================== RENDER HELPERS ===================== */
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function flowParse(str){
  const re=/\[\[(\d+)\|([^\]]+)\]\]/g;
  let out="",last=0,m;
  while((m=re.exec(str))!==null){
    out+=escapeHtml(str.slice(last,m.index));
    out+=`<mark class="flow-token flow-c${m[1]}">${escapeHtml(m[2])}</mark>`;
    last=m.index+m[0].length;
  }
  out+=escapeHtml(str.slice(last));
  return out;
}

function renderDashboard(){

  const grList = visiblePassages(session, grAll);

  const isAdmin = session.role === "admin";
  const adminHtml = isAdmin ? renderAdminPanel() : "";

  const cards = list.map(p=>{
    const tags = (p.targetTags||["ALL"]).map(t=>{
      const cls = t==="ALL" ? "tag all" : "tag";
      return `<span class="${cls}">${escapeHtml(t)}</span>`;
    }).join("");
    return `<div class="card" data-pid="${escapeHtml(p.id)}">
      <div class="no">Passage #${String(p.no||"").padStart(2,"0")}</div>
      <div class="ttl">${escapeHtml(p.title)}</div>
      <div class="topic">${escapeHtml(p.topic||"")}</div>
      <div class="tags">${tags}</div>
    </div>`;
  }).join("");

  const grCards = grList.map(g=>{

      const cls = t==="ALL" ? "tag all" : "tag";
      return `<span class="${cls}">${escapeHtml(t)}</span>`;
    }).join("");
    return `<div class="card gram" data-gid="${escapeHtml(g.id)}">
      <div class="no">Grammar #${String(g.no||"").padStart(2,"0")} · <span class="gram-tag">${escapeHtml(g.category||"문법")}</span></div>

      <div class="topic">${escapeHtml(g.formula||"")}</div>
      <div class="tags">${tags}</div>

  }).join("");

  const empty1 = list.length===0
    ? `<div class="empty">📭 배정된 독해 지문이 없습니다.</div>` : "";
  const empty2 = grList.length===0

    </div>

      <h2>${isAdmin?"🧩 문법 단원":"🧩 내 문법"}</h2>
      <span class="sub">${grList.length}개</span>
    </div>
    ${empty2}
    <div class="grid">${grCards}</div>
  `;

  document.querySelectorAll(".card[data-pid]").forEach(el=>{
    el.addEventListener("click",()=> go("passage", el.dataset.pid));

  document.getElementById("flowBtn").style.display="none";

/).map(s=>s.trim());
    const sentences = enLines.map((line,i)=>({en:line, ko:koLines[i]||"", vocab:[]}));

      no: DEFAULT_PASSAGES.length + extra.length + 1,

  document.getElementById("cm-clear").addEventListener("click",()=>{
    if(!confirm("localStorage에 추가된 지문을 모두 삭제할까요?")) return;
    saveExtraPassages([]); render();
  });

  // ----- 문법 -----
  document.getElementById("gm-add").addEventListener("click",()=>{
    const cat=v("gm-cat"), title=v("gm-title"), formula=v("gm-formula"),
          tagsRaw=v("gm-tags"), desc=v("gm-desc"), exRaw=v("gm-ex"), prRaw=v("gm-pr");
    const msg=document.getElementById("gm-msg");
    if(!title){ msg.className="msg err"; msg.textContent="단원 제목은 필수입니다."; return; }
    const examples = exRaw.split(/
?
/).map(s=>s.trim()).filter(Boolean).map(line=>{
      const [en, ko, note] = line.split("|").map(x=>(x||"").trim());
      return {en:en||"", ko:ko||"", note:note||""};
    });
    const practice = prRaw.split(/
?
/).map(s=>s.trim()).filter(Boolean).map(line=>{
      const [q,a,why] = line.split("|").map(x=>(x||"").trim());
      return {q:q||"", a:a||"", why:why||""};
    });
    const tags = (tagsRaw||"ALL").split(",").map(s=>s.trim()).filter(Boolean);
    const extra = loadExtraGrammars();
    extra.push({
      id:"ug"+Date.now(),
      no: DEFAULT_GRAMMARS.length + extra.length + 1,

    });
    saveExtraGrammars(extra);
    msg.className="msg ok"; msg.textContent=`✓ 추가됨. 현재 추가분: ${extra.length}개`;
    setTimeout(()=>render(),400);
  });
  document.getElementById("gm-clear").addEventListener("click",()=>{
    if(!confirm("localStorage에 추가된 문법 단원을 모두 삭제할까요?")) return;
    saveExtraGrammars([]); render();
  });
}

/* ===================== RENDER: passage ===================== */
function renderPassage(){
  const all = loadPassages();
  const p = all.find(x=>x.id===currentPid);
  if(!p){ go("dash"); return; }

  const sentencesHtml = (p.sentences||[]).map((s,i)=>`
    <div class="sent">
      <span class="no">#${String(i+1).padStart(2,"0")}</span>
      <div class="en">${flowParse(s.en||"")}</div>
      ${s.ko?`<div class="ko">${escapeHtml(s.ko)}</div>`:""}
      ${(s.vocab&&s.vocab.length)?`
      <table>
        <thead><tr><th style="width:18%">Word</th><th style="width:8%">POS</th><th style="width:24%">뜻</th><th style="width:25%">Synonyms</th><th style="width:25%">Antonyms</th></tr></thead>
        <tbody>${s.vocab.map(v=>`<tr><td><b>${escapeHtml(v[0])}</b></td><td>${escapeHtml(v[1])}</td><td>${escapeHtml(v[2])}</td><td>${escapeHtml(v[3])}</td><td>${escapeHtml(v[4])}</td></tr>`).join("")}</tbody>
      </table>`:""}
    </div>`).join("");

  const habrutaHtml = (p.habruta&&p.habruta.length)
    ? `<div class="section"><h2>② 하브루타 메타인지 토론</h2><ol class="hb">${p.habruta.map(h=>`<li>${escapeHtml(h)}</li>`).join("")}</ol></div>` : "";

  const blanksHtml = (p.blanks&&p.blanks.length)
    ? `<div class="section"><h2>③ 빈칸 마스터 테스트</h2>${p.blanks.map((b,i)=>`
      <div class="blank" data-i="${i}">
        <span>${i+1}.</span>
        <span>${escapeHtml(b[0]).replace("____",`<input data-ans="${escapeHtml(b[1])}" placeholder="(${escapeHtml(b[2])})"/>`)}</span>
        <button class="btn" data-check="${i}">확인</button>
        <span class="ans">정답: <b>${escapeHtml(b[1])}</b></span>
      </div>`).join("")}</div>` : "";

  const variantsHtml = (p.variants&&p.variants.length)
    ? `<div class="section"><h2>④ 수능형 변형 문제 (Paraphrasing)</h2>${p.variants.map((v,i)=>`
      <div class="var">
        <div class="q">[변형 ${i+1} · ${escapeHtml(v.type)}] ${escapeHtml(v.q)}</div>
        <ol>${v.choices.map(c=>`<li>${escapeHtml(c)}</li>`).join("")}</ol>
        <div class="ans">정답: ${v.answer+1}번</div>
        <div class="rat">근거: ${escapeHtml(v.rationale)}</div>
      </div>`).join("")}</div>` : "";

  document.getElementById("main").innerHTML = `
    <button class="btn back-btn no-print" id="backBtn">← 목록으로</button>
    <div class="sheet ${(isJuniorTags(p.targetTags)||isJuniorSession(session))?"junior":""}" id="sheet">
      <div class="head">
        <div>
          <div class="t">Hongi Ascend High-Master v3.0</div>
          <div class="s">Passage #${String(p.no||"").padStart(2,"0")} · ${escapeHtml(p.title)}</div>
        </div>
        <div class="s">${escapeHtml(p.source||"")}</div>
      </div>
      <div class="meta">주제 · ${escapeHtml(p.topic||"")}</div>
      ${p.thesis?`<div class="thesis">${flowParse(p.thesis)}</div>`:""}
      <div class="section"><h2>① 본문 정밀 분석 (FLOW · 직독직해 · Vocab Master)</h2>${sentencesHtml}</div>
      ${habrutaHtml}${blanksHtml}${variantsHtml}
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click",()=>go("dash"));
  document.querySelectorAll("[data-check]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const row=btn.closest(".blank");
      const inp=row.querySelector("input");
      const ok=(inp.value||"").trim().toLowerCase()===inp.dataset.ans.toLowerCase();
      row.classList.add("show");
      inp.style.borderColor = ok ? "#0f766e" : "#b91c1c";
    });
  });

  document.getElementById("flowBtn").style.display="";
  document.getElementById("printBtn").style.display="";
  document.getElementById("homeBtn").style.display="";
  document.getElementById("flowBtn").textContent = "🌊 FLOW ON";
}


/* ===================== RENDER: grammar ===================== */
function gramParse(str){
  // [[text]] → <mark class="ghl">text</mark>; [[n|text]] → flow color
  const re=/\[\[(?:(\d+)\|)?([^\]]+)\]\]/g;
  let out="",last=0,m;
  while((m=re.exec(str))!==null){
    out+=escapeHtml(str.slice(last,m.index));
    if(m[1]) out+=`<mark class="flow-token flow-c${m[1]}">${escapeHtml(m[2])}</mark>`;
    else     out+=`<mark class="hl">${escapeHtml(m[2])}</mark>`;
    last=m.index+m[0].length;
  }
  out+=escapeHtml(str.slice(last));
  return out;
}
function renderGrammar(){
  const all = loadGrammars();
  const g = all.find(x=>x.id===currentPid);
  if(!g){ go("dash"); return; }
  const junior = isJuniorTags(g.targetTags) || isJuniorSession(session);

  const exHtml = (g.examples||[]).map((e,i)=>`
    <div class="ex-block">
      <div class="en"><span class="gram-tag" style="margin-right:6px">예 ${i+1}</span>${gramParse(e.en||"")}</div>
      ${e.ko?`<div class="ko">${escapeHtml(e.ko)}</div>`:""}
      ${e.note?`<div class="note">▸ ${escapeHtml(e.note)}</div>`:""}
    </div>`).join("");

  const prHtml = (g.practice||[]).map((p,i)=>`
    <div class="pq" data-i="${i}">
      <div><b>Q${i+1}.</b> ${escapeHtml(p.q||"")}
        <button class="btn no-print" data-rev="${i}" style="margin-left:8px">정답 보기</button>
      </div>
      <div class="a">정답: <b>${escapeHtml(p.a||"")}</b> · ${escapeHtml(p.why||"")}</div>
    </div>`).join("");

  const memo = junior ? `<div class="memo-box no-print"></div><div class="memo-box no-print"></div>` : "";
  const banner = junior ? `<div class="junior-banner no-print">📘 중등부 가독성 모드 · 글자 크기 +10% · 메모칸 포함</div>` : "";

  document.getElementById("main").innerHTML = `
    <button class="btn back-btn no-print" id="backBtn">← 목록으로</button>
    ${banner}
    <div class="hl-tools no-print">
      <span style="font-size:11px;color:#64748b;font-weight:700">🖍 형광펜:</span>
      <button class="pen on" data-pen="yellow" style="background:#fef08a">노랑</button>
      <button class="pen" data-pen="green" style="background:#bbf7d0">초록</button>
      <button class="pen" data-pen="pink" style="background:#fbcfe8">분홍</button>
      <button class="pen" data-pen="off">OFF</button>
      <span style="font-size:11px;color:#64748b">→ 본문에서 단어/구를 드래그하면 칠해집니다.</span>
    </div>
    <div class="sheet ${junior?"junior":""} hl-target" id="sheet">
      <div class="head">
        <div>
          <div class="t">Hongi Ascend High-Master v3.0 · Grammar</div>
          <div class="s">Unit #${String(g.no||"").padStart(2,"0")} · ${escapeHtml(g.category||"")} · ${escapeHtml(g.title)}</div>
        </div>
        <div class="s">${(g.targetTags||["ALL"]).map(t=>escapeHtml(t)).join(" · ")}</div>
      </div>
      ${g.formula?`<div class="formula">📐 ${gramParse(g.formula)}</div>`:""}
      ${g.description?`<div class="gram-desc">${gramParse(g.description)}</div>`:""}
      <div class="section"><h2>① 예문 분석 (Highlight)</h2>${exHtml}</div>
      ${prHtml?`<div class="section"><h2>② 연습문제</h2>${prHtml}${memo}</div>`:memo}
    </div>
  `;
  document.getElementById("backBtn").addEventListener("click",()=>go("dash"));
  document.querySelectorAll("[data-rev]").forEach(b=>{
    b.addEventListener("click",()=>{
      b.closest(".pq").classList.toggle("show");
    });
  });

  // highlighter
  let pen="yellow";
  document.querySelectorAll(".pen").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".pen").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      pen = b.dataset.pen;
    });
  });
  document.getElementById("sheet").addEventListener("mouseup",()=>{
    if(pen==="off") return;
    const sel=window.getSelection();
    if(!sel || sel.isCollapsed) return;
    const range=sel.getRangeAt(0);
    if(!document.getElementById("sheet").contains(range.commonAncestorContainer)) return;
    const mark=document.createElement("mark");
    mark.className="user-hl"+(pen==="yellow"?"":" "+pen);
    try{ range.surroundContents(mark); sel.removeAllRanges(); }catch(e){}
  });

  document.getElementById("flowBtn").style.display="none";
  document.getElementById("printBtn").style.display="";
  document.getElementById("homeBtn").style.display="";
}

/* ===================== RENDER router ===================== */
function render(){
  // who
  const who = document.getElementById("who");
  if(session.role==="admin"){
    who.innerHTML = `<b>${escapeHtml(session.name)}</b> <span class="role-chip admin">ADMIN</span>`;
  }else{
    who.innerHTML = `<b>${escapeHtml(session.id)}</b> · ${escapeHtml(session.schoolName)} ${escapeHtml(session.grade)}학년 <span class="role-chip student">STUDENT</span>`;
  }
  if(currentView==="dash") renderDashboard();
  else if(currentView==="grammar") renderGrammar();
  else renderPassage();
}

/* ===================== Boot ===================== */
function showApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  go("dash");
}
function tryLogin(){
  const id=document.getElementById("lg-id").value.trim();
  const pw=document.getElementById("lg-pw").value;
  const s=authenticate(id,pw);
  if(s){ setSession(s); session=s; showApp(); }
  else{ document.getElementById("lg-err").textContent="아이디 또는 비밀번호가 올바르지 않습니다. (학생 PW = 학번)"; }
}
document.getElementById("lg-go").addEventListener("click",tryLogin);
document.getElementById("lg-pw").addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();});
document.getElementById("logout").addEventListener("click",()=>{ clearSession(); location.reload(); });
document.getElementById("flowBtn").addEventListener("click",()=>{
  flowOn=!flowOn;
  const sh=document.getElementById("sheet");
  if(sh) sh.classList.toggle("flow-on",flowOn);
  document.getElementById("flowBtn").textContent = flowOn ? "🌊 FLOW OFF" : "🌊 FLOW ON";
});
document.getElementById("printBtn").addEventListener("click",()=>window.print());
document.getElementById("homeBtn").addEventListener("click",()=>go("dash"));

// auto-resume
const saved=getSession();
if(saved){ session=saved; showApp(); }
</script>
