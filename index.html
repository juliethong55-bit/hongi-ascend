<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>홍이어쎈 통합 포털 · Hongi Ascend v5.6</title>
<!--
╔══════════════════════════════════════════════════════════════════╗
║  홍이어쎈 통합 포털 v5.6                                         ║
║  Part 1: <!DOCTYPE> ~ 데이터 섹션 끝                             ║
║  Part 2: 로직 시작 ~ </html>                                     ║
║                                                                  ║
║  수술 명세                                                        ║
║  ① AI 프롬프트 생성기                                            ║
║     · API 직접 호출 대신 → 홍이어쎈 규격 프롬프트 자동 생성      ║
║     · 원장님이 생성된 프롬프트를 Claude에 붙여넣으면 JSON 완성   ║
║     · [📋 프롬프트 복사] + [JSON 직접 붙여넣기] 2-step 워크플로 ║
║  ② 뷰어 이중 공존                                                ║
║     · 고등부: SVG 화살표 FlowConnections (sentences-wrap)        ║
║     · 중등부: story-block 적층형 카드 레이아웃                   ║
║     · resolveJunior() + forceMode 스위치 완전 작동               ║
║  ③ HTML 추출 — 렌더링된 sheet DOM 직접 다운로드                  ║
║     · 현재 화면의 #sheet 내용 → 독립 HTML                       ║
║     · 전체 데이터 하드코딩 버전도 별도 제공                      ║
║  ④ Seneca 13문장 + 문법 데이터 완전 보존                         ║

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap');

/* ══════════════════════════════════════════
   §1. 디자인 토큰
══════════════════════════════════════════ */
:root{
  --bg:#f5f7fb; --card:#fff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --primary:#1d4ed8; --primary-ink:#fff; --admin:#9333ea;
  --flow-1:#fde68a; --flow-2:#bbf7d0; --flow-3:#bfdbfe;
  --flow-4:#fbcfe8; --flow-5:#ddd6fe;
  --blue:#3182F6; --blue-lt:#EBF3FF; --blue-md:#C4DEFF;
  --gray-50:#F9FAFB; --gray-200:#E5E8EB; --gray-400:#9EA5B0;
  --gray-600:#6B7280; --gray-800:#1F2937;
  --red:#F04452; --red-lt:#FFF0F1;
  --green:#00B493; --green-lt:#E8FBF7;
  --orange:#FF6B35; --orange-lt:#FFF3EE;
  --purple:#6C63FF; --purple-lt:#F0EFFF;
}

/* ══════════════════════════════════════════
   §2. RESET
══════════════════════════════════════════ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{margin:0!important;padding:0!important;
  background:var(--bg);color:var(--ink);
  font-family:"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;}
button{font-family:inherit;cursor:pointer;}

/* ══════════════════════════════════════════
   §3. LOGIN
══════════════════════════════════════════ */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1e3a8a,#1d4ed8 60%,#0ea5e9);z-index:50;padding:20px;}
#login .box{background:#fff;border-radius:20px;padding:36px 32px;width:380px;
  box-shadow:0 30px 80px rgba(0,0,0,.3);}
#login h1{margin:0 0 4px;font-size:22px;letter-spacing:-.5px;}
#login p.sub{margin:0 0 22px;color:var(--muted);font-size:13px;}
#login label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;}
#login input{width:100%;padding:11px 12px;border:1px solid var(--line);
  border-radius:10px;font-size:14px;font-family:inherit;}
#login input:focus{outline:none;border-color:var(--primary);}
#login button.go{margin-top:18px;width:100%;padding:12px;background:var(--primary);
  color:#fff;border:0;border-radius:12px;font-weight:800;font-size:14px;}
#login .err{color:#b91c1c;font-size:12px;margin-top:8px;min-height:16px;}
#login .hint{margin-top:14px;font-size:11px;color:var(--muted);text-align:center;line-height:1.7;}
#login .hint code{background:#f1f5f9;padding:1px 6px;border-radius:4px;}

/* ══════════════════════════════════════════
   §4. APP SHELL & TOPBAR
══════════════════════════════════════════ */
#app{display:none;}
.topbar{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);
  padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:-.3px;}
.brand .h{width:32px;height:32px;border-radius:9px;background:var(--primary);
  color:#fff;display:grid;place-items:center;font-weight:900;}
.brand small{display:block;font-weight:500;color:var(--muted);font-size:11px;}
.who{font-size:12px;color:var(--muted);margin-left:6px;}
.who b{color:var(--ink);}
.role-chip{font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;margin-left:4px;}
.role-chip.admin{background:#f3e8ff;color:#6b21a8;}
.role-chip.student{background:#dbeafe;color:#1e40af;}
.role-chip.junior{background:#fef9c3;color:#854d0e;}
.spacer{flex:1;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:7px 14px;font-size:12px;font-weight:700;}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn.warn{background:#f59e0b;color:#fff;border-color:#f59e0b;}
.btn.admin{background:var(--admin);color:#fff;border-color:var(--admin);}
.btn.flow-on{background:var(--primary);color:#fff;}

/* 출력 모드 스위치 */
.mode-sw{display:flex;align-items:center;gap:4px;
  background:#f1f5f9;border:1px solid var(--line);border-radius:999px;padding:3px 6px;}
.mode-sw span{font-size:10px;font-weight:700;color:var(--muted);padding:0 3px;}
.mbtn{background:transparent;border:0;border-radius:999px;
  padding:4px 10px;font-size:10.5px;font-weight:700;color:var(--muted);
  transition:background .15s,color .15s;}
.mbtn.on{background:var(--primary);color:#fff;}
.mbtn.on-jr{background:#d97706;color:#fff;}

.wrap{padding:20px;display:flex;justify-content:center;}
.container{width:min(1080px,100%);}

/* ══════════════════════════════════════════
   §5. 대시보드 카드
══════════════════════════════════════════ */
.dash-head{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.dash-head h2{margin:0;font-size:18px;letter-spacing:-.4px;}
.dash-head .sub{font-size:12px;color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;
  cursor:pointer;transition:transform .15s,box-shadow .15s;}
.card:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(15,23,42,.08);}
.card .no{font-size:11px;color:var(--muted);font-weight:700;}
.card .ttl{font-size:15px;font-weight:800;margin:4px 0 6px;letter-spacing:-.3px;}
.card .topic{font-size:12px;color:#334155;line-height:1.5;}
.card .tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;background:#eff6ff;color:#1e40af;padding:2px 7px;border-radius:999px;font-weight:700;}
.tag.all{background:#dcfce7;color:#166534;}
.card.gram{border-left:4px solid #9333ea;}
.card.gram .no{color:#9333ea;}
.gram-tag{font-size:10px;background:#f3e8ff;color:#6b21a8;padding:2px 7px;border-radius:999px;font-weight:700;}
.empty{padding:40px;text-align:center;color:var(--muted);background:#fff;
  border:1px dashed var(--line);border-radius:14px;}

/* ══════════════════════════════════════════
   §6. SHEET — 고등부 180mm 분석지
══════════════════════════════════════════ */
.sheet{width:180mm;max-width:100%;background:#fff;border:1px solid var(--line);
  border-radius:14px;padding:14mm;box-shadow:0 10px 40px rgba(15,23,42,.06);margin:0 auto;}
.head{display:flex;justify-content:space-between;align-items:flex-end;
  border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:14px;}
.head .t{font-size:18px;font-weight:900;letter-spacing:-.4px;}
.head .s{font-size:11px;color:var(--muted);}
.meta{font-size:12px;color:var(--muted);margin-bottom:10px;}
.thesis{background:#f1f5f9;border-left:4px solid var(--primary);
  padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:14px;}
/* 고등 문장 카드 */
.sent{border:1px solid var(--line);border-radius:10px;padding:10px 12px;
  margin-bottom:10px;position:relative;}
.sent .no{position:absolute;top:-9px;left:10px;background:var(--primary);color:#fff;
  font-size:10px;padding:1px 8px;border-radius:999px;font-weight:800;}
.en{font-size:13.5px;line-height:1.7;margin:4px 0;}
.ko{font-size:12px;color:#334155;border-top:1px dashed var(--line);padding-top:6px;}
table{width:100%;border-collapse:collapse;margin-top:6px;font-size:11px;}
th,td{border:1px solid var(--line);padding:4px 6px;vertical-align:top;text-align:left;}
th{background:#f8fafc;font-weight:700;color:#475569;}
.section{margin-top:16px;border-top:2px solid var(--ink);padding-top:10px;}
.section h2{font-size:14px;margin:0 0 8px;letter-spacing:-.3px;}
.hb li{font-size:12px;margin-bottom:4px;line-height:1.55;}
.blank{display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:12px;margin:5px 0;}
.blank input{padding:3px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;min-width:120px;}
.blank .ans{display:none;color:#0f766e;font-weight:700;}
.blank.show .ans{display:inline;}
.var{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:8px;font-size:12px;}
.var .q{font-weight:700;margin-bottom:4px;}
.var ol{margin:4px 0 4px 18px;padding:0;}
.var .ans{font-size:11px;color:#0f766e;margin-top:4px;}
.var .rat{font-size:11px;color:var(--muted);margin-top:2px;}

/* ══════════════════════════════════════════
   §7. FLOW 토큰 & SVG 오버레이
══════════════════════════════════════════ */
.flow-token{border-radius:4px;padding:1px 4px;font-weight:700;
  transition:background-color .4s ease;background:transparent;}
.flow-on .flow-c1{background:var(--flow-1);}
.flow-on .flow-c2{background:var(--flow-2);}
.flow-on .flow-c3{background:var(--flow-3);}
.flow-on .flow-c4{background:var(--flow-4);}
.flow-on .flow-c5{background:var(--flow-5);}
.sentences-wrap{position:relative;}
.flow-svg-overlay{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:visible;}
mark.hl{background:#fef08a;padding:1px 4px;border-radius:4px;font-weight:700;}

/* ══════════════════════════════════════════
   §8. JUNIOR 하네스 & 중등 적층형 카드
══════════════════════════════════════════ */
.sheet.junior{font-size:110%;}
.sheet.junior .en{font-size:15px;line-height:2.0;}
.sheet.junior .ko{font-size:13.5px;line-height:1.9;}
.sheet.junior .sent{padding:14px 16px;margin-bottom:14px;border-width:2px;}
.sheet.junior .gram-desc{font-size:14.5px;line-height:2.0;}
.sheet.junior .formula-gram{font-size:14.5px;padding:14px;}
.sheet.junior .section h2{font-size:15.5px;}
.sheet.junior table{font-size:12.5px;}
.sheet.junior th,.sheet.junior td{padding:6px 8px;}
.junior-banner{background:#fff7ed;border:1px solid #fdba74;color:#9a3412;
  font-size:12px;padding:6px 10px;border-radius:8px;margin-bottom:10px;font-weight:700;}
.memo-box{border:1px dashed #94a3b8;border-radius:8px;height:60px;margin-top:6px;
  background:repeating-linear-gradient(transparent,transparent 19px,#e2e8f0 20px);position:relative;}
.memo-box::before{content:"📝 메모";position:absolute;top:-9px;left:10px;
  background:#fff;padding:0 6px;font-size:10px;color:#64748b;font-weight:700;}
/* 중등 적층형 */
.story-block{width:100%;break-inside:avoid;page-break-inside:avoid;
  margin-bottom:14px;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;
  -webkit-box-decoration-break:clone;box-decoration-break:clone;}
.s-banner{display:flex;align-items:center;gap:8px;background:var(--blue);color:#fff;padding:8px 14px;}
.s-icon{font-size:14px;flex-shrink:0;}
.s-ko{font-size:13px;font-weight:800;letter-spacing:-.3px;line-height:1.2;}
.s-en-sub{font-size:10px;font-weight:500;opacity:.85;letter-spacing:.3px;}
.psg-box{width:100%;background:var(--gray-50);border-bottom:1px solid var(--gray-200);padding:10px 14px;}
.psg-label{font-size:9.5px;font-weight:800;color:var(--blue);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.psg-text{font-size:14px;line-height:1.9;color:var(--gray-800);letter-spacing:-.01em;}
.psg-text p{margin-bottom:2px;}
.sn{display:inline-block;background:var(--blue);color:#fff;
  font-size:9.5px;font-weight:800;width:18px;height:18px;border-radius:50%;
  text-align:center;line-height:18px;margin-right:3px;vertical-align:middle;}
.anl-list{width:100%;display:flex;flex-direction:column;}
.anl-card{width:100%;background:#fff;border-bottom:1px solid var(--gray-200);
  padding:9px 14px;break-inside:avoid;page-break-inside:avoid;}
.anl-card:last-child{border-bottom:none;}
.ac-num{font-size:10px;font-weight:800;color:var(--blue);margin-bottom:5px;}
.ac-en{font-size:13px;font-weight:700;color:var(--gray-800);line-height:1.5;
  padding:4px 8px 4px 10px;background:var(--blue-lt);
  border-left:3px solid var(--blue);border-radius:0 5px 5px 0;
  margin-bottom:5px;letter-spacing:-.01em;}
.ac-en em{font-style:normal;font-weight:800;color:var(--blue);}
.ac-ko{font-size:12px;color:var(--gray-600);line-height:1.4;
  margin-bottom:7px;padding-left:10px;border-left:2px solid var(--gray-200);}
.tag-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;}
.tc{font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:10px;
  white-space:nowrap;flex-shrink:0;letter-spacing:.2px;line-height:1.6;}
.tc-g{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md);}
.tc-v{background:var(--orange-lt);color:var(--orange);border:1px solid #FFCDB5;}
.tc-i{background:var(--purple-lt);color:var(--purple);border:1px solid #C3BFF9;}
.tc-body{font-size:12.5px;line-height:1.45;color:var(--gray-800);flex:1;}
.tc-body strong{color:var(--blue);font-weight:800;}
.tc-body .vc{color:var(--orange);font-weight:700;}
.tc-body .ins{color:var(--purple);font-weight:700;}
.tc-body.ph{color:var(--gray-400);font-style:italic;}

/* ══════════════════════════════════════════
   §9. 문법 VIEWER + 다이어그램
══════════════════════════════════════════ */
.formula-gram{background:#fef3c7;border-left:4px solid #f59e0b;border-radius:8px;
  padding:10px 12px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;margin:10px 0;}
.gram-desc{font-size:13px;line-height:1.7;color:#1f2937;margin:8px 0 12px;white-space:pre-wrap;}
.ex-block{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.ex-block .en{font-size:13.5px;font-weight:600;line-height:1.7;}
.ex-block .ko{font-size:12px;color:#334155;border-top:1px dashed var(--line);padding-top:6px;margin-top:6px;}
.ex-block .note{font-size:11.5px;color:#6b21a8;margin-top:6px;line-height:1.6;}
.pq{border:1px dashed var(--line);border-radius:8px;padding:8px 11px;margin-bottom:6px;font-size:12.5px;line-height:1.7;}
.pq .a{display:none;color:#0f766e;font-weight:700;margin-top:4px;}
.pq.show .a{display:block;}
/* 다이어그램 */
.gram-diag-wrap{background:var(--gray-50);border:1px solid var(--gray-200);
  border-radius:9px;padding:10px 12px;margin-bottom:14px;}
.diag-grid{display:grid;grid-template-columns:1fr 34px 1fr;align-items:start;}
.diag-box{border-radius:7px;padding:6px 8px;break-inside:avoid;}
.diag-box-past{background:var(--orange-lt);border:1.5px solid var(--orange);}
.diag-box-perf{background:var(--blue-lt);border:1.5px solid var(--blue);}
.diag-box-gen{background:var(--gray-50);border:1.5px solid var(--gray-400);}
.diag-lbl{font-size:9px;font-weight:800;letter-spacing:.3px;margin-bottom:3px;}
.diag-lbl-past{color:var(--orange);} .diag-lbl-perf{color:var(--blue);} .diag-lbl-gen{color:var(--gray-800);}
.diag-form{font-size:9.5px;font-weight:700;font-family:'Courier New',monospace;
  background:rgba(255,255,255,.7);border-radius:4px;padding:2px 5px;display:inline-block;margin-bottom:3px;}
.diag-rows{display:flex;flex-direction:column;gap:2.5px;margin-top:3px;}
.diag-row{display:flex;align-items:flex-start;gap:4px;font-size:10.5px;color:var(--gray-600);line-height:1.45;}
.diag-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.diag-dot-past{background:var(--orange);} .diag-dot-perf{background:var(--blue);} .diag-dot-gen{background:var(--gray-400);}
.vs-col{display:flex;align-items:center;justify-content:center;}
.vs-badge{background:var(--gray-800);color:#fff;font-size:9px;font-weight:900;
  width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.diag-footer{display:grid;grid-template-columns:1fr 34px 1fr;margin-top:8px;}
.diag-key{border-radius:5px;padding:5px 7px;font-size:10.5px;line-height:1.55;}
.diag-key-past{background:var(--orange-lt);border-left:3px solid var(--orange);}
.diag-key-perf{background:var(--blue-lt);border-left:3px solid var(--blue);}
.diag-key strong{font-weight:800;display:block;margin-bottom:1px;}
/* practice sets */
.level-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.level-tab{font-size:9px;font-weight:800;padding:2px 10px;border-radius:20px;letter-spacing:.3px;}
.lt-basic{background:var(--green-lt);color:var(--green);border:1px solid var(--green);}
.lt-inter{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue);}
.lt-high{background:var(--red-lt);color:var(--red);border:1px solid var(--red);}
.set-block{margin-bottom:14px;}
.set-lbl{font-size:9.5px;font-weight:800;color:#fff;background:var(--gray-800);
  display:inline-block;padding:2px 10px;border-radius:4px;margin-bottom:6px;}
.set-lbl.basic{background:var(--green);} .set-lbl.inter{background:var(--blue);} .set-lbl.high{background:var(--red);}
.sent-cols{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;}
.sent-item{display:flex;gap:6px;align-items:flex-start;
  background:#fff;border:1px solid var(--gray-200);border-radius:6px;padding:6px 8px;}
.sent-num{background:var(--blue);color:#fff;font-size:8.5px;font-weight:800;
  min-width:17px;height:17px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.sent-num.red{background:var(--red);} .sent-num.green{background:var(--green);}
.sent-text{font-size:12.5px;line-height:1.6;color:var(--gray-800);word-break:break-word;}
.sent-text em{font-style:normal;font-weight:800;color:var(--blue);}
.sent-text .err{font-weight:800;color:var(--red);text-decoration:underline wavy var(--red);}
.err-chip{display:inline-block;background:var(--red-lt);color:var(--red);
  font-size:7.5px;font-weight:700;padding:0 5px;border-radius:3px;margin-left:3px;vertical-align:middle;}
.gq-block{border-top:1px solid var(--gray-200);padding-top:7px;margin-top:7px;}
.gq-lbl{font-size:12px;font-weight:800;color:var(--gray-800);margin-bottom:5px;}
.gq-choices{display:flex;gap:5px;flex-wrap:wrap;}
.gq-choice{font-size:11px;background:#fff;border:1px solid var(--gray-200);
  border-radius:5px;padding:2px 9px;color:var(--gray-600);}

.admin-panel{background:#fff;border:2px solid var(--admin);border-radius:14px;

.admin-panel h3{margin:0 0 4px;font-size:15px;color:var(--admin);letter-spacing:-.3px;}
.admin-panel .ph{font-size:11px;color:var(--muted);margin-bottom:10px;}

.admin-panel label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:700;}
.admin-panel input,.admin-panel textarea{width:100%;padding:7px 10px;

.admin-panel .actions{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;}
.admin-panel .msg{font-size:11px;color:var(--muted);}
.admin-panel .msg.ok{color:#0f766e;} .admin-panel .msg.err{color:#b91c1c;}
.tabs{display:flex;gap:6px;margin-bottom:10px;border-bottom:1px solid var(--line);}
.tabs button{background:transparent;border:0;padding:8px 14px;font-weight:800;
  font-size:12px;color:var(--muted);border-bottom:3px solid transparent;border-radius:0;}
.tabs button.on{color:var(--admin);border-bottom-color:var(--admin);}
.pane{display:none;} .pane.on{display:block;}
.back-btn{margin-bottom:12px;}

function normalizePassage(p){
  if(!p) return p;
  p.sentences=(p.sentences||[]).map(s=>({
    en:s.en||"", ko:s.ko||"",
    vocab:(s.vocab||[]).map(v=>{
      const a=Array.isArray(v)
        ? v
        : [v.word||"",v.pos||"",v.meaning||"",v.syn||"",v.ant||""];
      while(a.length<5) a.push("");
      return a.slice(0,5);
    })
  }));
  p.habruta  = p.habruta  || [];
  p.blanks   = p.blanks   || [];
  p.variants = p.variants || [];
  p.thesis   = p.thesis   || p.topic || "";
  p.targetTags = p.targetTags || ["ALL"];
  return p;
}
function normalizeGrammar(g){
  if(!g) return g;
  g.examples     = (g.examples||[]).map(e=>({en:e.en||"",ko:e.ko||"",note:e.note||""}));
  g.practice     = (g.practice||[]).map(p=>({q:p.q||"",a:p.a||"",why:p.why||""}));
  g.practiceSets = g.practiceSets || [];
  g.targetTags   = g.targetTags   || ["ALL"];
  g.description  = g.description  || "";
  g.formula      = g.formula      || "";
  return g;
}

function loadPassages(){
  try{
    const r=localStorage.getItem(LS_KEY);
    const e=r?JSON.parse(r):[];
    return [...DEFAULT_PASSAGES,...(Array.isArray(e)?e:[])].map(normalizePassage);
  }catch{ return DEFAULT_PASSAGES.map(normalizePassage); }
}

function parseStudentId(id){
  if(!/^\d{8}$/.test(id)) return null;
  const school=id.slice(0,2), grade=id.slice(2,3), serial=id.slice(3);
  return{
    role:"student", id, school, grade, serial,
    schoolName: SCHOOLS[school]||`학교${school}`,
    tags:["ALL",`S${school}`,`S${school}-G${grade}`,
          ...(/^(1[0-2])$/.test(school)?["중"+grade]:[])],
    isJunior:/^(1[0-2])$/.test(school)
  };
}
function authenticate(id,pw){
  if(/^admin/i.test(id)){
    if(pw==="ascend") return{role:"admin",id,name:"원장(Admin)",tags:["*"],isJunior:false};
    return null;
  }
  const s=parseStudentId(id);
  if(s && pw===id) return s;
  return null;
}
function isJuniorTags(tags){ return(tags||[]).some(t=>/^중[123]$/.test(t)); }
function isJuniorSession(s){ if(!s||s.role!=="student") return false; return !!s.isJunior; }
function visiblePassages(sess,all){
  if(!sess) return [];
  if(sess.role==="admin") return all;
  return all.filter(p=>{
    const t=p.targetTags||["ALL"];
    return t.some(x=>sess.tags.includes(x));
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function flowParse(str){
  const re=/\[\[(\d+)\|([^\]]+)\]\]/g;
  let out="",last=0,m;
  while((m=re.exec(str))!==null){
    out+=escapeHtml(str.slice(last,m.index));
    out+=`<mark class="flow-token flow-c${m[1]}" data-flow-group="${m[1]}">${escapeHtml(m[2])}</mark>`;
    last=m.index+m[0].length;
  }
  return out+escapeHtml(str.slice(last));
}
function gramParse(str){
  const re=/\[\[(?:(\d+)\|)?([^\]]+)\]\]/g;
  let out="",last=0,m;
  while((m=re.exec(str))!==null){
    out+=escapeHtml(str.slice(last,m.index));
    if(m[1]) out+=`<mark class="flow-token flow-c${m[1]}">${escapeHtml(m[2])}</mark>`;
    else     out+=`<mark class="hl">${escapeHtml(m[2])}</mark>`;
    last=m.index+m[0].length;
  }
  return out+escapeHtml(str.slice(last));
}
function getVal(id){ return(document.getElementById(id)?.value||"").trim(); }
function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=v; }

/* ════════════════════════════════════════════════════
   SVG FLOW CONNECTIONS
   (index.html FlowConnections 완전 이식 — vanilla JS)
════════════════════════════════════════════════════ */
const GC={
  "1":"var(--flow-1)","2":"var(--flow-2)","3":"var(--flow-3)",
  "4":"var(--flow-4)","5":"var(--flow-5)"
};
const SN="http://www.w3.org/2000/svg";
let _raf=null,_ro=null,_fon=false,_fc=null;

function schedSVG(){
  if(_raf) cancelAnimationFrame(_raf);
  _raf=requestAnimationFrame(computeSVG);
}
function computeSVG(){
  const ct=_fc;
  if(!ct||!_fon){ clearSVG(ct); return; }
  const rb=ct.getBoundingClientRect();
  const toks=Array.from(ct.querySelectorAll(".flow-token[data-flow-group]"));
  const byG=new Map();
  toks.forEach(t=>{
    const g=t.dataset.flowGroup||"";
    if(!g) return;
    if(!byG.has(g)) byG.set(g,[]);
    byG.get(g).push(t);
  });
  const lines=[];
  byG.forEach((arr,g)=>{
    for(let i=0;i<arr.length-1;i++){
      const a=arr[i].getBoundingClientRect();
      const b=arr[i+1].getBoundingClientRect();
      lines.push({
        x1:a.left-rb.left+a.width/2, y1:a.bottom-rb.top,
        x2:b.left-rb.left+b.width/2, y2:b.top-rb.top,
        color:GC[g]||"var(--primary)", group:g
      });
    }
  });
  let svg=ct.querySelector(".flow-svg-overlay");
  if(svg) svg.remove();
  if(!lines.length) return;

  svg=document.createElementNS(SN,"svg");
  svg.setAttribute("class","flow-svg-overlay no-print");
  svg.setAttribute("width",rb.width);
  svg.setAttribute("height",rb.height);
  svg.setAttribute("viewBox",`0 0 ${rb.width} ${rb.height}`);

  const defs=document.createElementNS(SN,"defs");
  Object.entries(GC).forEach(([g,c])=>{
    const mk=document.createElementNS(SN,"marker");
    mk.setAttribute("id",`arw-${g}`);
    mk.setAttribute("viewBox","0 0 10 10");
    mk.setAttribute("refX","8"); mk.setAttribute("refY","5");
    mk.setAttribute("markerWidth","6"); mk.setAttribute("markerHeight","6");
    mk.setAttribute("orient","auto-start-reverse");
    const p=document.createElementNS(SN,"path");
    p.setAttribute("d","M0,0 L10,5 L0,10 z");
    p.setAttribute("fill",c); p.setAttribute("opacity","0.85");
    mk.appendChild(p); defs.appendChild(mk);
  });
  svg.appendChild(defs);

  lines.forEach(l=>{
    const dist=Math.hypot(l.x2-l.x1,l.y2-l.y1);
    const cv=Math.min(80,dist/3);
    const pe=document.createElementNS(SN,"path");
    pe.setAttribute("d",`M ${l.x1} ${l.y1} C ${l.x1} ${l.y1+cv}, ${l.x2} ${l.y2-cv}, ${l.x2} ${l.y2}`);
    pe.setAttribute("fill","none");
    pe.setAttribute("stroke",l.color);
    pe.setAttribute("stroke-width","1.6");
    pe.setAttribute("stroke-opacity","0.55");
    pe.setAttribute("stroke-dasharray","4 3");
    pe.setAttribute("marker-end",`url(#arw-${l.group})`);
    const an=document.createElementNS(SN,"animate");
    an.setAttribute("attributeName","stroke-dashoffset");
    an.setAttribute("from","0"); an.setAttribute("to","-14");
    an.setAttribute("dur","1.2s"); an.setAttribute("repeatCount","indefinite");
    pe.appendChild(an);
    svg.appendChild(pe);
  });
  ct.appendChild(svg);
}
function clearSVG(c){ if(!c) return; const s=c.querySelector(".flow-svg-overlay"); if(s) s.remove(); }
function mountFlow(ct){
  if(_ro) _ro.disconnect();
  _fc=ct;
  _ro=new ResizeObserver(schedSVG);
  _ro.observe(ct);
  window.addEventListener("resize",schedSVG);
  setTimeout(schedSVG,250);
}
function unmountFlow(){
  if(_ro){ _ro.disconnect(); _ro=null; }
  window.removeEventListener("resize",schedSVG);
  _fc=null;
}

function renderDiagram(d){
  if(!d||d.type!=="vs") return "";
  const{left:L,right:R,footer:F}=d;

    `<div class="diag-row"><div class="diag-dot ${escapeHtml(L.dotClass||"diag-dot-gen")}"></div><div>${r}</div></div>`
  ).join("");
  const rR=(R.rows||[]).map(r=>
    `<div class="diag-row"><div class="diag-dot ${escapeHtml(R.dotClass||"diag-dot-gen")}"></div><div>${r}</div></div>`
  ).join("");
  return `
  <div class="gram-diag-wrap">
    <div class="diag-grid">
      <div class="diag-box ${escapeHtml(L.boxClass||"diag-box-gen")}">
        <div class="diag-lbl ${escapeHtml(L.labelClass||"diag-lbl-gen")}">${escapeHtml(L.label||"")}</div>
        <div class="diag-form">${escapeHtml(L.form||"")}</div>
        <div class="diag-rows">${rL}</div>
      </div>
      <div class="vs-col"><div class="vs-badge">VS</div></div>
      <div class="diag-box ${escapeHtml(R.boxClass||"diag-box-gen")}">
        <div class="diag-lbl ${escapeHtml(R.labelClass||"diag-lbl-gen")}">${escapeHtml(R.label||"")}</div>
        <div class="diag-form">${escapeHtml(R.form||"")}</div>
        <div class="diag-rows">${rR}</div>
      </div>
    </div>
    ${F?`<div class="diag-footer">
      <div class="diag-key ${escapeHtml(F.leftClass||"")}">${F.left||""}</div>
      <div></div>
      <div class="diag-key ${escapeHtml(F.rightClass||"")}">${F.right||""}</div>
    </div>`:""}
  </div>`;
}

function renderPracticeSets(sets){
  if(!sets||!sets.length) return "";
  const tabs=[...new Set(sets.map(s=>s.level))].map(l=>{
    const cls=l==="basic"?"lt-basic":l==="inter"?"lt-inter":"lt-high";
    const lbl=l==="basic"?"● BASIC":l==="inter"?"● INTERMEDIATE":"● HIGH-END";
    return `<span class="level-tab ${cls}">${lbl}</span>`;
  }).join("");
  const body=sets.map(s=>{
    const lc=s.level==="basic"?"basic":s.level==="inter"?"inter":"high";
    const items=(s.items||[]).map(it=>`
      <div class="sent-item">
        <div class="sent-num ${escapeHtml(it.numClass||"")}">${escapeHtml(it.num||"")}</div>
        <div class="sent-text">${it.text||""}</div>
      </div>`).join("");
    const choices=(s.choices||[]).map((c,i)=>
      `<span class="gq-choice ${i===s.answer?"ans":""}">${escapeHtml(c)}</span>`
    ).join("");
    return `
    <div class="set-block">
      <div class="set-lbl ${lc}">${escapeHtml(s.label||"")}</div>
      <div class="sent-cols">${items}</div>
      <div class="gq-block">
        <div class="gq-lbl">Q. ${s.q||""}</div>
        <div class="gq-choices">${choices}</div>
        <div class="gq-ans-key">${s.ansKey||""}</div>
      </div>
    </div>`;
  }).join("");
  return `<div class="level-tabs">${tabs}</div>${body}`;
}

function buildPassagePrompt(title,topic,enText){
  const lines=enText.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);

function safeParseJSON(raw){
  const clean=raw.replace(/```json|```/g,"").trim();
  return JSON.parse(clean);

function extractFullPortal(){
  try{
    const allP=JSON.stringify(loadPassages(),null,2);
    const allG=JSON.stringify(loadGrammars(),null,2);
    let base=document.documentElement.outerHTML;
    base=base.replace(
      /const DEFAULT_PASSAGES=\[[\s\S]*?\];\s*\n/,
      `const DEFAULT_PASSAGES=${allP};\n`
    );
    base=base.replace(
      /const DEFAULT_GRAMMARS=\[[\s\S]*?\];\s*\n/,
      `const DEFAULT_GRAMMARS=${allG};\n`
    );
    const ts=new Date().toLocaleString("ko-KR");
    base=base.replace("</title>",
      `</title>\n<!-- STANDALONE · ${ts} · Hongi Ascend v5.6 -->`);
    downloadBlob(base,`hongi_v56_portal_${Date.now()}.html`);
  }catch(e){ alert("추출 오류: "+e.message); console.error(e); }
}

function downloadBlob(html,filename){
  const blob=new Blob([html],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function copyToClipboard(text){
  try{
    await navigator.clipboard.writeText(text);
    return true;
  }catch{
    const ta=document.createElement("textarea");
    ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select();
    const ok=document.execCommand("copy");
    document.body.removeChild(ta);
    return ok;
  }
}

function renderDashboard(){

  const isAdmin=session.role==="admin";

      <div class="topic">${escapeHtml(g.formula||"")}</div>

  document.getElementById("main").innerHTML=`
    ${adminHtml}
    <div class="dash-head">
      <h2>${isAdmin?"📚 독해 지문":"📖 내 독해"}</h2>
      <span class="sub">${list.length}개 · ${isAdmin?"원장 권한":`${escapeHtml(session.schoolName||"")} ${escapeHtml(session.grade||"")}학년`}</span>
    </div>
    ${list.length===0?`<div class="empty">📭 배정된 독해 지문이 없습니다.</div>`:""}
    <div class="grid">${cards}</div>
    <div class="dash-head" style="margin-top:22px">
      <h2>${isAdmin?"🧩 문법 단원":"🧩 내 문법"}</h2>

    <div class="grid">${gCards}</div>

  document.querySelectorAll(".card[data-pid]").forEach(el=>
    el.addEventListener("click",()=>go("passage",el.dataset.pid)));
  document.querySelectorAll(".card[data-gid]").forEach(el=>
    el.addEventListener("click",()=>go("grammar",el.dataset.gid)));
  if(isAdmin) bindAdminPanel();

  document.getElementById("flowBtn").style.display="none";
  document.getElementById("printBtn").style.display="none";
  document.getElementById("homeBtn").style.display="none";
}

function bindAdminPanel(){
  /* 탭 */
  document.querySelectorAll(".admin-panel .tab-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".admin-panel .tab-btn").forEach(x=>x.classList.remove("on"));
      document.querySelectorAll(".admin-panel .pane").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      document.getElementById(b.dataset.tab).classList.add("on");
    });
  });

  /* HTML 추출 */
  document.getElementById("btn-dl-sheet").addEventListener("click",extractRenderedSheet);
  document.getElementById("btn-dl-all").addEventListener("click",extractFullPortal);

  /* ── 독해 프롬프트 생성 ── */
  document.getElementById("cm-gen-prompt").addEventListener("click",()=>{
    const en=getVal("cm-en");
    if(!en){ alert("본문 영문을 먼저 입력해 주세요."); return; }
    const prompt=buildPassagePrompt(getVal("cm-title"),getVal("cm-topic"),en);
    document.getElementById("cm-prompt-text").textContent=prompt;
    document.getElementById("cm-prompt-box").classList.remove("hidden");
  });
  document.getElementById("cm-copy-prompt").addEventListener("click",async()=>{
    const ok=await copyToClipboard(document.getElementById("cm-prompt-text").textContent);
    if(ok){
      const el=document.getElementById("cm-copy-ok");
      el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2000);
    }
  });

  /* ── 독해 JSON 적용 ── */
  document.getElementById("cm-json-apply").addEventListener("click",()=>{
    const raw=getVal("cm-json-in");
    const errEl=document.getElementById("cm-json-err");
    const okEl=document.getElementById("cm-json-ok");
    errEl.textContent=""; okEl.classList.remove("show");
    if(!raw){ errEl.textContent="JSON을 붙여넣어 주세요."; return; }
    try{
      const r=safeParseJSON(raw);
      if(r.thesis&&!getVal("cm-topic"))
        setVal("cm-topic",r.thesis.replace(/\[\[\d+\|([^\]]+)\]\]/g,"$1"));
      if(r.sentences?.length){
        setVal("cm-en",r.sentences.map(s=>s.en||"").join("\n"));
        setVal("cm-ko",r.sentences.map(s=>s.ko||"").join("\n"));
      }
      window._cmParsed=r;
      okEl.classList.add("show"); setTimeout(()=>okEl.classList.remove("show"),2000);
    }catch(e){ errEl.textContent="JSON 파싱 오류: "+e.message.slice(0,60); }
  });

  /* ── 독해 추가 ── */
  document.getElementById("cm-add").addEventListener("click",()=>{
    const title=getVal("cm-title"),source=getVal("cm-source"),
          topic=getVal("cm-topic"),tagsRaw=getVal("cm-tags"),
          en=getVal("cm-en"),ko=getVal("cm-ko");
    const msg=document.getElementById("cm-msg");
    if(!title||!en){ msg.className="msg err"; msg.textContent="제목과 본문은 필수입니다."; return; }
    const enLines=en.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    const koLines=ko.split(/\r?\n/).map(s=>s.trim());
    const r=window._cmParsed||null;
    const sentences=enLines.map((line,i)=>{
      const aiS=r?.sentences?.[i];
      return{ en:line, ko:koLines[i]||(aiS?.ko)||"", vocab:(aiS?.vocab)||[] };
    });
    const tags=(tagsRaw||"ALL").split(",").map(s=>s.trim()).filter(Boolean);
    const extra=loadExtraPassages();
    extra.push({
      id:"u"+Date.now(), no:DEFAULT_PASSAGES.length+extra.length+1,
      title, source, topic,
      targetTags:tags.length?tags:["ALL"],
      thesis:r?.thesis||topic||"",
      sentences,
      habruta:r?.habruta||[], blanks:r?.blanks||[], variants:r?.variants||[]
    });
    saveExtraPassages(extra);
    window._cmParsed=null;
    msg.className="msg ok";
    msg.textContent=`✓ 추가됨. 현재 추가분: ${extra.length}개`;
    setTimeout(()=>render(),400);
  });
  document.getElementById("cm-clear").addEventListener("click",()=>{
    if(!confirm("추가된 지문을 모두 삭제할까요?")) return;
    saveExtraPassages([]); render();
  });

  /* ── 문법 프롬프트 생성 ── */
  document.getElementById("gm-gen-prompt").addEventListener("click",()=>{
    const cat=getVal("gm-cat"),title=getVal("gm-title"),
          formula=getVal("gm-formula"),desc=getVal("gm-desc");
    if(!title&&!desc){ alert("단원 제목 또는 개념 설명을 입력해 주세요."); return; }
    const prompt=buildGrammarPrompt(cat,title,formula,desc);
    document.getElementById("gm-prompt-text").textContent=prompt;
    document.getElementById("gm-prompt-box").classList.remove("hidden");
  });
  document.getElementById("gm-copy-prompt").addEventListener("click",async()=>{
    const ok=await copyToClipboard(document.getElementById("gm-prompt-text").textContent);
    if(ok){
      const el=document.getElementById("gm-copy-ok");
      el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2000);
    }
  });

  /* ── 문법 JSON 적용 ── */
  document.getElementById("gm-json-apply").addEventListener("click",()=>{
    const raw=getVal("gm-json-in");
    const errEl=document.getElementById("gm-json-err");
    const okEl=document.getElementById("gm-json-ok");
    errEl.textContent=""; okEl.classList.remove("show");
    if(!raw){ errEl.textContent="JSON을 붙여넣어 주세요."; return; }
    try{
      const r=safeParseJSON(raw);
      if(r.description) setVal("gm-desc",r.description);
      if(r.examples?.length)
        setVal("gm-ex",r.examples.map(e=>`${e.en||""}|${e.ko||""}|${e.note||""}`).join("\n"));
      if(r.practice?.length)
        setVal("gm-pr",r.practice.map(p=>`${p.q||""}|${p.a||""}|${p.why||""}`).join("\n"));
      window._gmParsed=r;
      okEl.classList.add("show"); setTimeout(()=>okEl.classList.remove("show"),2000);
    }catch(e){ errEl.textContent="JSON 파싱 오류: "+e.message.slice(0,60); }
  });

  /* ── 문법 추가 ── */
  document.getElementById("gm-add").addEventListener("click",()=>{
    const cat=getVal("gm-cat"),title=getVal("gm-title"),
          formula=getVal("gm-formula"),tagsRaw=getVal("gm-tags"),
          desc=getVal("gm-desc"),exRaw=getVal("gm-ex"),prRaw=getVal("gm-pr");
    const msg=document.getElementById("gm-msg");
    if(!title){ msg.className="msg err"; msg.textContent="단원 제목은 필수입니다."; return; }
    const r=window._gmParsed||null;
    const examples=exRaw
      ? exRaw.split(/\r?\n/).map(s=>s.trim()).filter(Boolean)
          .map(line=>{ const[en,ko,note]=line.split("|").map(x=>(x||"").trim()); return{en,ko,note}; })
      : (r?.examples||[]);
    const practice=prRaw
      ? prRaw.split(/\r?\n/).map(s=>s.trim()).filter(Boolean)
          .map(line=>{ const[q,a,why]=line.split("|").map(x=>(x||"").trim()); return{q,a,why}; })
      : (r?.practice||[]);
    const tags=(tagsRaw||"ALL").split(",").map(s=>s.trim()).filter(Boolean);
    const extra=loadExtraGrammars();
    extra.push({
      id:"ug"+Date.now(), no:DEFAULT_GRAMMARS.length+extra.length+1,
      category:cat||"기타", title, formula,
      description:desc||(r?.description)||"",
      targetTags:tags.length?tags:["ALL"],
      examples, practice
    });
    saveExtraGrammars(extra);
    window._gmParsed=null;
    msg.className="msg ok";
    msg.textContent=`✓ 추가됨. 현재 추가분: ${extra.length}개`;
    setTimeout(()=>render(),400);
  });
  document.getElementById("gm-clear").addEventListener("click",()=>{
    if(!confirm("추가된 문법 단원을 모두 삭제할까요?")) return;
    saveExtraGrammars([]); render();
  });
}

/* ════════════════════════════════════════════════════
   RENDER: PASSAGE
   고등부 SVG 화살표 ↔ 중등부 story-block 카드 공존
════════════════════════════════════════════════════ */
function renderPassage(){
  const all=loadPassages();
  const p=all.find(x=>x.id===currentPid);
  if(!p){ go("dash"); return; }
  const junior=resolveJunior(p);
  let bodyHtml="";

  if(junior){
    /* 중등부: 수직 적층형 카드 */
    const sentCards=(p.sentences||[]).map((s,i)=>{
      const gramRow=s.gramFocus
        ?`<div class="tag-row"><span class="tc tc-g">Grammar</span><div class="tc-body"><strong>${escapeHtml(s.gramFocus)}</strong></div></div>`
        :`<div class="tag-row"><span class="tc tc-g">Grammar</span><div class="tc-body ph">홍이어쎈 문법 분석 예정</div></div>`;
      const vocabRow=(s.vocab&&s.vocab.length)
        ?`<div class="tag-row"><span class="tc tc-v">Vocab</span><div class="tc-body">${
            s.vocab.map(v=>{const a=Array.isArray(v)?v:[v.word||"","",v.meaning||"","",""];
              return `<span class="vc">${escapeHtml(a[0])}</span> ${escapeHtml(a[2])}`;
            }).join(" &nbsp;/&nbsp; ")}</div></div>`
        :`<div class="tag-row"><span class="tc tc-v">Vocab</span><div class="tc-body ph">홍이어쎈 어휘 분석 예정</div></div>`;
      const insightRow=s.insight
        ?`<div class="tag-row"><span class="tc tc-i">Insight</span><div class="tc-body"><span class="ins">${escapeHtml(s.insight)}</span></div></div>`
        :`<div class="tag-row"><span class="tc tc-i">Insight</span><div class="tc-body ph">홍이어쎈 논리 분석 예정</div></div>`;
      return `<div class="anl-card">
        <div class="ac-num">S${i+1}</div>
        <div class="ac-en">${flowParse(s.en||"")}</div>
        ${s.ko?`<div class="ac-ko">${escapeHtml(s.ko)}</div>`:""}
        ${gramRow}${vocabRow}${insightRow}
      </div>`;
    }).join("");

    bodyHtml=`
    <div class="story-block">
      <div class="s-banner">
        <div class="s-icon">📖</div>
        <div>
          <div class="s-ko">${escapeHtml(p.title||"")}</div>
          <div class="s-en-sub">${escapeHtml(p.source||"")}</div>
        </div>
      </div>
      <div class="psg-box">
        <div class="psg-label">📖 Reading Passage — 지문을 읽고 분석 카드를 완성하세요</div>
        <div class="psg-text">
          ${(p.sentences||[]).map((s,i)=>
            `<p><span class="sn">${i+1}</span>${escapeHtml(s.en||"")}</p>`
          ).join("")}
        </div>
      </div>
      <div class="anl-list">${sentCards}</div>
    </div>`;

  } else {
    /* 고등부: 180mm 분석지 + SVG FLOW */
    const sHtml=(p.sentences||[]).map((s,i)=>{
      const vRows=(s.vocab&&s.vocab.length)
        ?`<table><thead><tr>
            <th style="width:18%">Word</th><th style="width:8%">POS</th>
            <th style="width:24%">뜻</th><th style="width:25%">유의어</th><th style="width:25%">반의어</th>
          </tr></thead><tbody>${s.vocab.map(v=>{
            const a=Array.isArray(v)?v:[v.word||"",v.pos||"",v.meaning||"",v.syn||"",v.ant||""];
            return `<tr><td><b>${escapeHtml(a[0]||"")}</b></td><td>${escapeHtml(a[1]||"")}</td>
              <td>${escapeHtml(a[2]||"")}</td><td>${escapeHtml(a[3]||"")}</td><td>${escapeHtml(a[4]||"")}</td></tr>`;
          }).join("")}</tbody></table>` : "";
      return `<div class="sent">
        <span class="no">#${String(i+1).padStart(2,"0")}</span>
        <div class="en">${flowParse(s.en||"")}</div>
        ${s.ko?`<div class="ko">${escapeHtml(s.ko)}</div>`:""}
        ${vRows}
      </div>`;
    }).join("");
    bodyHtml=`
    <div class="section">
      <h2>① 본문 정밀 분석 (FLOW · 직독직해 · Vocab Master)</h2>
      <div class="sentences-wrap" id="sentences-wrap">${sHtml}</div>
    </div>`;
  }

  /* 공통 섹션 */
  const habrutaHtml=(p.habruta?.length)
    ?`<div class="section"><h2>② 하브루타 메타인지 토론</h2>
       <ol class="hb">${p.habruta.map(h=>`<li>${escapeHtml(h)}</li>`).join("")}</ol></div>`:"";
  const blanksHtml=(p.blanks?.length)
    ?`<div class="section"><h2>③ 빈칸 마스터 테스트</h2>${
       p.blanks.map((b,i)=>`<div class="blank" data-i="${i}">
         <span>${i+1}.</span>
         <span>${escapeHtml(b[0]).replace("____",
           `<input data-ans="${escapeHtml(b[1])}" placeholder="(${escapeHtml(b[2]||"")})"/>`)}</span>
         <button class="btn" data-check="${i}">확인</button>
         <span class="ans">정답: <b>${escapeHtml(b[1])}</b></span>
       </div>`).join("")}</div>`:"";
  const variantsHtml=(p.variants?.length)
    ?`<div class="section"><h2>④ 수능형 변형 문제</h2>${
       p.variants.map((v,i)=>`<div class="var">
         <div class="q">[변형 ${i+1} · ${escapeHtml(v.type||"")}] ${escapeHtml(v.q||"")}</div>
         <ol>${(v.choices||[]).map(c=>`<li>${escapeHtml(c)}</li>`).join("")}</ol>
         <div class="ans">정답: ${(v.answer||0)+1}번</div>
         <div class="rat">근거: ${escapeHtml(v.rationale||"")}</div>
       </div>`).join("")}</div>`:"";

  document.getElementById("main").innerHTML=`
    <button class="btn back-btn no-print" id="backBtn">← 목록으로</button>
    ${junior?`<div class="junior-banner no-print">📘 중등부 가독성 모드 · 적층형 카드</div>`:""}
    <div class="sheet ${junior?"junior":""}" id="sheet">
      <div class="head">
        <div>
          <div class="t">Hongi Ascend v5.6${junior?" · 중등독해 클리닉":""}</div>
          <div class="s">Passage #${String(p.no||"").padStart(2,"0")} · ${escapeHtml(p.title||"")}</div>
        </div>
        <div class="s">${escapeHtml(p.source||"")}</div>
      </div>
      <div class="meta">주제 · ${escapeHtml(p.topic||"")}</div>
      ${p.thesis?`<div class="thesis">${flowParse(p.thesis)}</div>`:""}
      ${bodyHtml}${habrutaHtml}${blanksHtml}${variantsHtml}
      ${junior?`<div class="memo-box no-print"></div><div class="memo-box no-print"></div>`:""}
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click",()=>go("dash"));
  document.querySelectorAll("[data-check]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const row=btn.closest(".blank"),inp=row.querySelector("input");
      const ok=(inp.value||"").trim().toLowerCase()===inp.dataset.ans.toLowerCase();
      row.classList.add("show"); inp.style.borderColor=ok?"#0f766e":"#b91c1c";
    });
  });

  const fbtn=document.getElementById("flowBtn");
  fbtn.style.display=junior?"none":"";
  document.getElementById("printBtn").style.display="";
  document.getElementById("homeBtn").style.display="";
  fbtn.textContent="🌊 FLOW ON"; fbtn.classList.remove("flow-on");

  if(!junior){
    const wrap=document.getElementById("sentences-wrap");
    if(wrap){ _fon=false; mountFlow(wrap); }
  }
}

/* ════════════════════════════════════════════════════
   RENDER: GRAMMAR
════════════════════════════════════════════════════ */
function renderGrammar(){
  const all=loadGrammars();
  const g=all.find(x=>x.id===currentPid);
  if(!g){ go("dash"); return; }
  const junior=resolveJunior(g);

  const exHtml=(g.examples||[]).map((e,i)=>`
    <div class="ex-block">
      <div class="en"><span class="gram-tag" style="margin-right:6px">예 ${i+1}</span>${gramParse(e.en||"")}</div>
      ${e.ko?`<div class="ko">${escapeHtml(e.ko)}</div>`:""}
      ${e.note?`<div class="note">▸ ${escapeHtml(e.note)}</div>`:""}
    </div>`).join("");

  const prHtml=(g.practice||[]).map((p,i)=>`
    <div class="pq" data-i="${i}">
      <div><b>Q${i+1}.</b> ${escapeHtml(p.q||"")}
        <button class="btn no-print" data-rev="${i}" style="margin-left:8px">정답 보기</button>
      </div>
      <div class="a">정답: <b>${escapeHtml(p.a||"")}</b> · ${escapeHtml(p.why||"")}</div>
    </div>`).join("");

  const diagHtml=renderDiagram(g.diagram||null);
  const psHtml=renderPracticeSets(g.practiceSets||[]);
  const memo=junior?`<div class="memo-box no-print"></div><div class="memo-box no-print"></div>`:"";

  document.getElementById("main").innerHTML=`
    <button class="btn back-btn no-print" id="backBtn">← 목록으로</button>
    ${junior?`<div class="junior-banner no-print">📘 중등부 모드 · 다이어그램 + 메모칸</div>`:""}
    <div class="hl-tools no-print">
      <span style="font-size:11px;color:#64748b;font-weight:700">🖍 형광펜:</span>
      <button class="pen on" data-pen="yellow" style="background:#fef08a">노랑</button>
      <button class="pen" data-pen="green"  style="background:#bbf7d0">초록</button>
      <button class="pen" data-pen="pink"   style="background:#fbcfe8">분홍</button>
      <button class="pen" data-pen="off">OFF</button>
    </div>
    <div class="sheet ${junior?"junior":""} hl-target" id="sheet">
      <div class="head">
        <div>
          <div class="t">Hongi Ascend v5.6 · Grammar${junior?" · 중등문법 클리닉":""}</div>
          <div class="s">Unit #${String(g.no||"").padStart(2,"0")} · ${escapeHtml(g.category||"")} · ${escapeHtml(g.title||"")}</div>
        </div>
        <div class="s">${(g.targetTags||["ALL"]).map(t=>escapeHtml(t)).join(" · ")}</div>
      </div>
      ${diagHtml}
      ${g.formula?`<div class="formula-gram">📐 ${gramParse(g.formula)}</div>`:""}
      ${g.description?`<div class="gram-desc">${gramParse(g.description)}</div>`:""}
      ${psHtml?`<div class="section"><h2>📝 Multi-Mix 문법 연습</h2>${psHtml}</div>`:""}
      ${exHtml?`<div class="section"><h2>① 예문 분석</h2>${exHtml}</div>`:""}
      ${prHtml?`<div class="section"><h2>② 연습문제</h2>${prHtml}${memo}</div>`:memo}
    </div>
  `;

  document.getElementById("backBtn").addEventListener("click",()=>go("dash"));
  document.querySelectorAll("[data-rev]").forEach(b=>{
    b.addEventListener("click",()=>b.closest(".pq").classList.toggle("show"));
  });

  let pen="yellow";
  document.querySelectorAll(".pen").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".pen").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); pen=b.dataset.pen;
    });
  });
  const sheet=document.getElementById("sheet");
  sheet.addEventListener("mouseup",()=>{
    if(pen==="off") return;
    const sel=window.getSelection();
    if(!sel||sel.isCollapsed) return;
    const range=sel.getRangeAt(0);
    if(!sheet.contains(range.commonAncestorContainer)) return;
    const mark=document.createElement("mark");
    mark.className="user-hl"+(pen==="yellow"?"":" "+pen);
    try{ range.surroundContents(mark); sel.removeAllRanges(); }catch(e){}
  });

  document.getElementById("flowBtn").style.display="none";
  document.getElementById("printBtn").style.display="";
  document.getElementById("homeBtn").style.display="";
}

/* ════════════════════════════════════════════════════
   RENDER ROUTER
════════════════════════════════════════════════════ */
function render(){
  const who=document.getElementById("who");
  if(session.role==="admin"){
    who.innerHTML=`<b>${escapeHtml(session.name||"")}</b><span class="role-chip admin">ADMIN</span>`;
  }else{
    const jc=isJuniorSession(session)
      ?`<span class="role-chip junior">중등부</span>`
      :`<span class="role-chip student">STUDENT</span>`;
    who.innerHTML=`<b>${escapeHtml(session.id||"")}</b> · ${escapeHtml(session.schoolName||"")} ${escapeHtml(session.grade||"")}학년 ${jc}`;
  }
  if(currentView==="dash")         renderDashboard();
  else if(currentView==="grammar") renderGrammar();
  else                             renderPassage();
}

/* ════════════════════════════════════════════════════
   BOOT — window.onload 이중 방어
════════════════════════════════════════════════════ */
window.onload=function(){

  function tryLogin(){
    try{
      const id=(document.getElementById("lg-id").value||"").trim();
      const pw=document.getElementById("lg-pw").value||"";
      document.getElementById("lg-err").textContent="";
      const s=authenticate(id,pw);
      if(s){ setSession(s); session=s; showApp(); }
      else{ document.getElementById("lg-err").textContent="아이디 또는 비밀번호가 올바르지 않습니다."; }
    }catch(e){
      console.error("[v5.6]",e);
      document.getElementById("lg-err").textContent="오류가 발생했습니다.";
    }
  }

  function showApp(){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    if(session.role==="admin")
      document.getElementById("mode-sw").style.display="flex";
    go("dash");
  }

  document.getElementById("lg-go").addEventListener("click",e=>{
    e.preventDefault(); tryLogin();
  });
  ["lg-pw","lg-id"].forEach(id=>{
    document.getElementById(id).addEventListener("keydown",e=>{
      if(e.key==="Enter"){ e.preventDefault(); tryLogin(); }
    });
  });

  document.getElementById("logout").addEventListener("click",()=>{
    unmountFlow(); clearSession(); location.reload();
  });

  /* 출력 모드 스위치 */
  document.querySelectorAll(".mbtn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      forceMode=btn.dataset.m;
      document.querySelectorAll(".mbtn").forEach(b=>b.classList.remove("on","on-jr"));
      btn.classList.add(forceMode==="junior"?"on-jr":"on");
      if(currentView!=="dash") render();
    });
  });

  /* FLOW 토글 */
  document.getElementById("flowBtn").addEventListener("click",()=>{
    flowOn=!flowOn; _fon=flowOn;
    const fb=document.getElementById("flowBtn");
    const wrap=document.getElementById("sentences-wrap");
    if(wrap){ wrap.classList.toggle("flow-on",flowOn); schedSVG(); }
    fb.textContent=flowOn?"🌊 FLOW OFF":"🌊 FLOW ON";
    if(flowOn) fb.classList.add("flow-on");
    else{ fb.classList.remove("flow-on"); if(wrap) clearSVG(wrap); }
  });

  document.getElementById("printBtn").addEventListener("click",()=>window.print());
  document.getElementById("homeBtn").addEventListener("click",()=>go("dash"));

  /* auto-resume */
  try{
    const saved=getSession();
    if(saved){ session=saved; showApp(); }
  }catch(e){ console.error("[v5.6 auto-resume]",e); }

}; /* end window.onload */
</script>
</body>
</html>
